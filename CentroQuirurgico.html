<head>

    <style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">

<script>
    // ================================================================
    // CONFIGURACIÓN SUPABASE
    // ================================================================
    const SUPABASE_URL = 'https://hdhqzawcylkvttsqqjty.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_x5r7hUrN2pzVexbtZ_b0Wg_OBDEMAKP';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const FIXED_WARD = 'Centro Quirurgico';

    // ================================================================
    // SEMÁFORO (UNIFORME CON TODAS LAS SALAS)
    // ================================================================
    function obtenerSemaforo(nombre, valor, denominador) {
        if (denominador === 0) {
            return { color: 'status-neutral', texto: 'N/A' };
        }

        const umbrales = {
            'Cumplimiento registros perioperatorios': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumplimiento conteo instrumental': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumplimiento higiene de manos': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumplimiento posicionamiento seguro': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Incidencia de LPP quirúrgicas': { verde: 2, amarillo: 5, rojo: 10, invertido: true },
            'Cumplimiento Lista de Verificación': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumplimiento identificación segura': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumplimiento cirugías programadas': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
        };

        const u = umbrales[nombre] || { verde: 90, amarillo: 70, rojo: 50, invertido: false };
        let color, texto;

        if (u.invertido) {
            if (valor <= u.verde) { color = 'status-green';
                texto = 'Cumplido'; } else if (valor <= u.amarillo) { color = 'status-yellow';
                texto = 'En observación'; } else if (valor <= u.rojo) { color = 'status-yellow';
                texto = 'En observación'; } else { color = 'status-red';
                texto = 'Revisar'; }
        } else {
            if (valor >= u.verde) { color = 'status-green';
                texto = 'Cumplido'; } else if (valor >= u.amarillo) { color = 'status-yellow';
                texto = 'En observación'; } else if (valor >= u.rojo) { color = 'status-yellow';
                texto = 'En observación'; } else { color = 'status-red';
                texto = 'Revisar'; }
        }

        return { color, texto };
    }

    // ================================================================
    // GESTIÓN DE DATOS
    // ================================================================
    async function getData() {
        const { data, error } = await supabaseClient
            .from("REGISTROS")
            .select("*")
            .eq("ward", FIXED_WARD)
            .order("date", { ascending: true });
        if (error) { console.error(error); return []; }
        return data.map(row => row.data);
    }

    async function saveData(record) {
        const { data: existing, error: checkError } = await supabaseClient
            .from("REGISTROS")
            .select("id")
            .eq("date", record.date)
            .eq("ward", FIXED_WARD)
            .maybeSingle();
        if (checkError) { console.error(checkError); alert("Error de verificación"); return false; }
        if (existing) {
            const { error } = await supabaseClient
                .from("REGISTROS")
                .update({ data: record })
                .eq("id", existing.id);
            if (error) { console.error(error); alert("Error al actualizar"); return false; }
        } else {
            const { error } = await supabaseClient
                .from("REGISTROS")
                .insert({ date: record.date, ward: FIXED_WARD, data: record });
            if (error) { console.error(error); alert("Error al insertar"); return false; }
        }
        return true;
    }

    // ================================================================
    // FUNCIONES AUXILIARES
    // ================================================================
    function updateTotal() {
        const start = parseInt(document.getElementById('startPatients').value) || 0;
        const adm = parseInt(document.getElementById('admissions').value) || 0;
        const dis = parseInt(document.getElementById('discharges').value) || 0;
        document.getElementById('totalPatients').value = Math.max(0, start + adm - dis);
    }

    // ================================================================
    // CALCULAR INDICADORES
    // ================================================================
    function calcularIndicadores(record) {
        const indicadores = {};

        // Cirugías
        const pctCirugias = record.surgeryTotal > 0 ? (record.surgeryDone / record.surgeryTotal * 100) : 0;
        indicadores.cirugias = { label: 'Cumplimiento cirugías programadas', numerator: record.surgeryDone || 0,
            denominator: record.surgeryTotal || 0, result: pctCirugias, format: 'percent' };

        const lista = [
            { key: 'registros', label: 'Cumplimiento registros perioperatorios', num: record.registrosCompletos ||
                    0, den: record.totalHistoriasAuditadas || 0, fmt: 'percent' },
            { key: 'conteo', label: 'Cumplimiento conteo instrumental', num: record.conteoCorrecto || 0,
                den: record.totalCirugiasConteo || 0, fmt: 'percent' },
            { key: 'higiene', label: 'Cumplimiento higiene de manos', num: record.higieneManosCorrecta || 0,
                den: record.totalOportunidadesHigiene || 0, fmt: 'percent' },
            { key: 'posicionamiento', label: 'Cumplimiento posicionamiento seguro', num: record
                    .posicionamientoCorrecto || 0, den: record.totalPacientesPosicion || 0, fmt: 'percent' },
            { key: 'lpp', label: 'Incidencia de LPP quirúrgicas', num: record.lppQuirurgico || 0,
                den: record.totalPacientesLPP || 0, fmt: 'percent' },
            { key: 'listaVerificacion', label: 'Cumplimiento Lista de Verificación', num: record
                    .listaVerificacionRegistrada || 0, den: record.totalCirugiasLista || 0, fmt: 'percent' },
            { key: 'identificacion', label: 'Cumplimiento identificación segura', num: record
                    .identificacionCorrecta || 0, den: record.totalPacientesIdentificacion || 0,
                fmt: 'percent' },
        ];

        lista.forEach(ind => {
            let result = 0;
            if (ind.den > 0) {
                if (ind.fmt === 'percent') result = (ind.num / ind.den) * 100;
                else result = ind.num / ind.den;
            }
            indicadores[ind.key] = { label: ind.label, numerator: ind.num, denominator: ind.den, result,
                format: ind.fmt };
        });

        return indicadores;
    }

    // ================================================================
    // RENDERIZAR ÚLTIMO REGISTRO INDICADORES
    // ================================================================
    async function renderUltimoRegistroIndicadores() {
        const container = document.getElementById('ultimoRegistroIndicadores');
        const data = await getData();
        if (data.length === 0) {
            container.innerHTML = '<p class="text-muted">No hay registros aún.</p>';
            return;
        }
        const ultimo = data.sort((a, b) => b.date.localeCompare(a.date))[0];
        const indicadores = calcularIndicadores(ultimo);
        const keys = ['cirugias', 'registros', 'conteo', 'higiene', 'posicionamiento', 'lpp', 'listaVerificacion',
            'identificacion'
        ];

        let html =
            `<div class="table-responsive"><table class="table table-bordered table-sm indicador-tabla">
          <thead><tr><th>Indicador</th><th>Numerador</th><th>Denominador</th><th>Resultado</th><th>Estado</th></tr></thead><tbody>`;
        for (const key of keys) {
            const ind = indicadores[key];
            if (!ind) continue;
            let resultado = '—';
            if (ind.denominator === 0) {
                resultado = '—';
            } else if (ind.format === 'percent') {
                resultado = ind.result.toFixed(1) + '%';
            } else {
                resultado = ind.result.toFixed(1);
            }
            const sem = obtenerSemaforo(ind.label, ind.result, ind.denominator);
            html += `<tr class="${sem.color}">
              <td><strong>${ind.label}</strong></td>
              <td>${ind.numerator}</td>
              <td>${ind.denominator}</td>
              <td>${resultado}</td>
              <td>${sem.texto}</td>
            </tr>`;
        }
        html += '</tbody></table></div>';
        container.innerHTML = html;
    }

    // ================================================================
    // RENDERIZAR ÚLTIMOS REGISTROS
    // ================================================================
    async function renderLastEntries() {
        const container = document.getElementById('lastEntries');
        const data = await getData();
        if (data.length === 0) {
            container.innerHTML = '<p class="text-muted">No hay registros.</p>';
            return;
        }
        let html =
            `<div class="table-responsive"><table class="table table-sm table-bordered">
          <thead><tr><th>Fecha</th><th>Inicio</th><th>Ingresos</th><th>Egresos</th><th>Total</th><th>Cirugías</th><th>Reg.Completos</th><th>Conteo</th><th>Higiene</th><th>LPP</th><th>Acción</th></tr></thead><tbody>`;
        data.slice(0, 15).forEach(r => {
            html += `<tr>
            <td>${r.date}</td>
            <td>${r.startPatients||0}</td>
            <td>${r.admissions||0}</td>
            <td>${r.discharges||0}</td>
            <td>${r.totalPatients}</td>
            <td>${r.surgeryDone||0}/${r.surgeryTotal||0}</td>
            <td>${r.registrosCompletos||0}/${r.totalHistoriasAuditadas||0}</td>
            <td>${r.conteoCorrecto||0}/${r.totalCirugiasConteo||0}</td>

          </tr>`;

        container.innerHTML = html;

    async function deleteRecord(date, ward) {
        if (!confirm(`¿Eliminar el registro del día ${date}?`)) return;
        const { error } = await supabaseClient
            .from('REGISTROS')
            .delete()
            .eq('date', date)
            .eq('ward', ward);
        if (error) {
            alert("Error al eliminar.");
            return;
        }
        await refreshAll();
        document.getElementById('registerFeedback').innerHTML =
            `<div class="alert alert-warning">🗑️ Registro del ${date} eliminado.</div>`;
    }

    // ================================================================
    // DASHBOARD
    // ================================================================
    async function renderDashboard(ward) {
        const container = document.getElementById('dashboardContent');
        const data = await getData();
        if (data.length === 0) {
            container.innerHTML =
                `<div class="alert alert-warning">No hay registros para <strong>${ward}</strong>. Comienza a registrar.</div>`;
            return;
        }

        const months = {};
        data.forEach(d => {
            const key = d.date.substring(0, 7);
            if (!months[key]) months[key] = [];
            months[key].push(d);
        });
        const sortedMonths = Object.keys(months).sort();
        const names = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Set', 'Oct', 'Nov', 'Dic'];

        function calcMonthlyIndicators(monthData) {
            const sum = {};
            monthData.forEach(r => {
                for (const key in r) {
                    if (typeof r[key] === 'number') {
                        if (!sum[key]) sum[key] = 0;
                        sum[key] += r[key];
                    }
                }
            });
            const ind = {
                totalPatients: sum.totalPatients || 0,
                admissions: sum.admissions || 0,
                surgeryDone: sum.surgeryDone || 0,
                surgeryTotal: sum.surgeryTotal || 0,
                registrosCompletos: sum.registrosCompletos || 0,
                totalHistoriasAuditadas: sum.totalHistoriasAuditadas || 0,
                conteoCorrecto: sum.conteoCorrecto || 0,
                totalCirugiasConteo: sum.totalCirugiasConteo || 0,
                higieneManosCorrecta: sum.higieneManosCorrecta || 0,
                totalOportunidadesHigiene: sum.totalOportunidadesHigiene || 0,
                posicionamientoCorrecto: sum.posicionamientoCorrecto || 0,
                totalPacientesPosicion: sum.totalPacientesPosicion || 0,
                lppQuirurgico: sum.lppQuirurgico || 0,
                totalPacientesLPP: sum.totalPacientesLPP || 0,
                listaVerificacionRegistrada: sum.listaVerificacionRegistrada || 0,
                totalCirugiasLista: sum.totalCirugiasLista || 0,
                identificacionCorrecta: sum.identificacionCorrecta || 0,
                totalPacientesIdentificacion: sum.totalPacientesIdentificacion || 0,
            };
            ind.pctCirugias = ind.surgeryTotal > 0 ? (ind.surgeryDone / ind.surgeryTotal * 100) : 0;
            ind.pctRegistros = ind.totalHistoriasAuditadas > 0 ? (ind.registrosCompletos / ind
                .totalHistoriasAuditadas * 100) : 0;
            ind.pctConteo = ind.totalCirugiasConteo > 0 ? (ind.conteoCorrecto / ind.totalCirugiasConteo *
            100) : 0;
            ind.pctHigiene = ind.totalOportunidadesHigiene > 0 ? (ind.higieneManosCorrecta / ind
                .totalOportunidadesHigiene * 100) : 0;
            ind.pctPosicion = ind.totalPacientesPosicion > 0 ? (ind.posicionamientoCorrecto / ind
                .totalPacientesPosicion * 100) : 0;
            ind.pctLPP = ind.totalPacientesLPP > 0 ? (ind.lppQuirurgico / ind.totalPacientesLPP * 100) : 0;
            ind.pctLista = ind.totalCirugiasLista > 0 ? (ind.listaVerificacionRegistrada / ind
                .totalCirugiasLista * 100) : 0;
            ind.pctIdentificacion = ind.totalPacientesIdentificacion > 0 ? (ind.identificacionCorrecta / ind
                .totalPacientesIdentificacion * 100) : 0;
            return ind;
        }

        const monthIndicators = sortedMonths.map(m => calcMonthlyIndicators(months[m]));
        const last = monthIndicators[monthIndicators.length - 1] || {};

        let html =
            `<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
          <h4 class="mb-2"><i class="fas fa-chart-pie me-2"></i> Dashboard - ${ward}</h4>
        </div>`;

        // KPIs
        const kpis = [
            { label: 'Pacientes-día', value: last.totalPatients || 0, unit: '', den: 1 },
            { label: 'Cumpl. cirugías programadas', value: last.pctCirugias || 0, unit: '%',
                den: last.surgeryTotal },
            { label: 'Cumpl. registros perioperatorios', value: last.pctRegistros || 0, unit: '%',
                den: last.totalHistoriasAuditadas },
            { label: 'Cumpl. conteo instrumental', value: last.pctConteo || 0, unit: '%',
                den: last.totalCirugiasConteo },
            { label: 'Cumpl. higiene de manos', value: last.pctHigiene || 0, unit: '%',
                den: last.totalOportunidadesHigiene },
            { label: 'Cumpl. posicionamiento seguro', value: last.pctPosicion || 0, unit: '%',
                den: last.totalPacientesPosicion },
            { label: 'Incidencia LPP quirúrgicas', value: last.pctLPP || 0, unit: '%', den: last
                .totalPacientesLPP },
            { label: 'Cumpl. Lista Verificación', value: last.pctLista || 0, unit: '%',
                den: last.totalCirugiasLista },
            { label: 'Cumpl. identificación segura', value: last.pctIdentificacion || 0, unit: '%',
                den: last.totalPacientesIdentificacion },
        ];

        html += `<div class="row g-3 mb-4">`;
        kpis.forEach(k => {
            const val = typeof k.value === 'number' ? k.value.toFixed(1) : '0.0';
            const sem = obtenerSemaforo(k.label, k.value, k.den || 0);
            html += `<div class="col-md-3"><div class="kpi-card" style="border-left-color: ${sem.color === 'status-green' ? '#28a745' : sem.color === 'status-yellow' ? '#ffc107' : sem.color === 'status-red' ? '#dc3545' : '#6c757d'};">
              <div class="kpi-label">${k.label}</div>
              <div class="kpi-value">${val}<span class="kpi-unit">${k.unit}</span></div>
              <small class="${sem.color} sem-foro-texto">${sem.texto}</small>
            </div></div>`;
        });
        html += `</div>`;

        // Gráfico
        const chartLabels = [
            'Cirugías', 'Registros', 'Conteo', 'Higiene', 'Posicionamiento', 'LPP', 'Lista Verif.',
            'Identificación'
        ];
        const chartData = [
            last.pctCirugias || 0,
            last.pctRegistros || 0,
            last.pctConteo || 0,
            last.pctHigiene || 0,
            last.pctPosicion || 0,
            last.pctLPP || 0,
            last.pctLista || 0,
            last.pctIdentificacion || 0,
        ];
        const colors = ['#0a3d62', '#e74c3c', '#8e44ad', '#1abc9c', '#3498db', '#dc3545', '#f39c12', '#6610f2'];

        html += `<div class="row"><div class="col-md-12"><div class="chart-container"><canvas id="chartTodosIndicadores"></canvas></div></div></div>`;

        // Tabla detalle
        html += `<div class="card mt-4">
          <div class="card-header"><i class="fas fa-table me-2"></i>Detalle de indicadores (último mes)</div>
          <div class="card-body">
            <div class="table-responsive"><table class="table table-bordered table-striped indicador-tabla">
              <thead><tr><th>Indicador</th><th>Numerador</th><th>Denominador</th><th>Resultado</th><th>Estado</th></tr></thead><tbody>`;

        const detalle = [
            { label: 'Cumplimiento cirugías programadas', num: last.surgeryDone || 0, den: last.surgeryTotal ||
                    0, fmt: 'percent' },
            { label: 'Cumplimiento registros perioperatorios', num: last.registrosCompletos || 0,
                den: last.totalHistoriasAuditadas || 0, fmt: 'percent' },
            { label: 'Cumplimiento conteo instrumental', num: last.conteoCorrecto || 0,
                den: last.totalCirugiasConteo || 0, fmt: 'percent' },
            { label: 'Cumplimiento higiene de manos', num: last.higieneManosCorrecta || 0,
                den: last.totalOportunidadesHigiene || 0, fmt: 'percent' },
            { label: 'Cumplimiento posicionamiento seguro', num: last.posicionamientoCorrecto || 0,
                den: last.totalPacientesPosicion || 0, fmt: 'percent' },
            { label: 'Incidencia de LPP quirúrgicas', num: last.lppQuirurgico || 0,
                den: last.totalPacientesLPP || 0, fmt: 'percent' },
            { label: 'Cumplimiento Lista de Verificación', num: last.listaVerificacionRegistrada || 0,
                den: last.totalCirugiasLista || 0, fmt: 'percent' },
            { label: 'Cumplimiento identificación segura', num: last.identificacionCorrecta || 0,
                den: last.totalPacientesIdentificacion || 0, fmt: 'percent' },
        ];

        detalle.forEach(ind => {
            let resultado = '—';
            let val = 0;
            if (ind.den === 0) {
                resultado = '—';
            } else {
                val = (ind.num / ind.den) * 100;
                resultado = val.toFixed(1) + '%';
            }
            const sem = obtenerSemaforo(ind.label, val, ind.den || 0);
            html += `<tr class="${sem.color}">
              <td><strong>${ind.label}</strong></td>
              <td>${ind.num}</td>
              <td>${ind.den}</td>
              <td>${resultado}</td>
              <td>${sem.texto}</td>
            </tr>`;
        });

        html += `</tbody></table></div></div></div>`;
        container.innerHTML = html;

        setTimeout(() => {
            const ctx = document.getElementById('chartTodosIndicadores');
            if (ctx) {
                if (window.chartTodos) window.chartTodos.destroy();
                window.chartTodos = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: chartLabels,
                        datasets: [{
                            label: 'Último mes',
                            data: chartData,
                            backgroundColor: colors,
                            borderRadius: 6,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx =>
                                    ctx.parsed.y.toFixed(1) + '%' } } },
                        scales: { y: { beginAtZero: true, title: { display: true,
                                text: '%' } } }
                    }
                });
            }
        }, 300);
    }

    // ================================================================
    // REPORTE TRIMESTRAL
    // ================================================================
    async function renderReport(ward) {
        const container = document.getElementById('reportContent');
        const data = await getData();
        if (data.length === 0) {
            container.innerHTML =
                `<div class="alert alert-warning">No hay datos para <strong>${ward}</strong>.</div>`;
            return;
        }

        function getQuarter(m) {
            const mo = parseInt(m.split('-')[1]);
            if (mo <= 3) return 'Trim I';
            if (mo <= 6) return 'Trim II';
            if (mo <= 9) return 'Trim III';
            return 'Trim IV';
        }

        const quarters = {};
        data.forEach(d => {
            const key = d.date.substring(0, 7);
            const q = getQuarter(key);
            if (!quarters[q]) quarters[q] = [];
            quarters[q].push(d);
        });

        const sortedQuarters = ['Trim I', 'Trim II', 'Trim III', 'Trim IV'];
        const quarterData = {};
        sortedQuarters.forEach(q => {
            const records = quarters[q] || [];
            if (records.length === 0) { quarterData[q] = null; return; }
            const sum = {};
            records.forEach(r => {
                for (const key in r) {
                    if (typeof r[key] === 'number') {
                        if (!sum[key]) sum[key] = 0;
                        sum[key] += r[key];
                    }
                }
            });
            const ind = {
                totalPatients: sum.totalPatients || 0,
                surgeryDone: sum.surgeryDone || 0,
                surgeryTotal: sum.surgeryTotal || 0,
                registrosCompletos: sum.registrosCompletos || 0,
                totalHistoriasAuditadas: sum.totalHistoriasAuditadas || 0,
                conteoCorrecto: sum.conteoCorrecto || 0,
                totalCirugiasConteo: sum.totalCirugiasConteo || 0,
                higieneManosCorrecta: sum.higieneManosCorrecta || 0,
                totalOportunidadesHigiene: sum.totalOportunidadesHigiene || 0,
                posicionamientoCorrecto: sum.posicionamientoCorrecto || 0,
                totalPacientesPosicion: sum.totalPacientesPosicion || 0,
                lppQuirurgico: sum.lppQuirurgico || 0,
                totalPacientesLPP: sum.totalPacientesLPP || 0,
                listaVerificacionRegistrada: sum.listaVerificacionRegistrada || 0,
                totalCirugiasLista: sum.totalCirugiasLista || 0,
                identificacionCorrecta: sum.identificacionCorrecta || 0,
                totalPacientesIdentificacion: sum.totalPacientesIdentificacion || 0,
            };
            ind.pctCirugias = ind.surgeryTotal > 0 ? (ind.surgeryDone / ind.surgeryTotal * 100) : 0;
            ind.pctRegistros = ind.totalHistoriasAuditadas > 0 ? (ind.registrosCompletos / ind
                .totalHistoriasAuditadas * 100) : 0;
            ind.pctConteo = ind.totalCirugiasConteo > 0 ? (ind.conteoCorrecto / ind.totalCirugiasConteo *
            100) : 0;
            ind.pctHigiene = ind.totalOportunidadesHigiene > 0 ? (ind.higieneManosCorrecta / ind
                .totalOportunidadesHigiene * 100) : 0;
            ind.pctPosicion = ind.totalPacientesPosicion > 0 ? (ind.posicionamientoCorrecto / ind
                .totalPacientesPosicion * 100) : 0;
            ind.pctLPP = ind.totalPacientesLPP > 0 ? (ind.lppQuirurgico / ind.totalPacientesLPP * 100) : 0;
            ind.pctLista = ind.totalCirugiasLista > 0 ? (ind.listaVerificacionRegistrada / ind
                .totalCirugiasLista * 100) : 0;
            ind.pctIdentificacion = ind.totalPacientesIdentificacion > 0 ? (ind.identificacionCorrecta / ind
                .totalPacientesIdentificacion * 100) : 0;
            quarterData[q] = ind;
        });

        let html =
            `<h4>Reporte Trimestral - ${ward}</h4>
        <p class="text-muted">Cada indicador se muestra con su valor, numerador y denominador.</p>
        <div class="table-responsive"><table class="table table-bordered table-striped table-indicators" id="quarterTable">
          <thead><tr><th>Indicador</th>${sortedQuarters.map(q => `<th>${q}</th>`).join('')}</tr></thead><tbody>`;

        const rows = [
            { label: 'Pacientes-día', key: 'totalPatients', fmt: v => v },
            { label: 'Cumplimiento cirugías programadas (%)', key: 'pctCirugias', fmt: v => (v).toFixed(1) +
                    '%' },
            { label: 'Cumplimiento registros perioperatorios (%)', key: 'pctRegistros',
            fmt: v => (v).toFixed(1) + '%' },
            { label: 'Cumplimiento conteo instrumental (%)', key: 'pctConteo', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Cumplimiento higiene de manos (%)', key: 'pctHigiene', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Cumplimiento posicionamiento seguro (%)', key: 'pctPosicion', fmt: v => (v).toFixed(1) +
                    '%' },
            { label: 'Incidencia de LPP quirúrgicas (%)', key: 'pctLPP', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Cumplimiento Lista de Verificación (%)', key: 'pctLista', fmt: v => (v).toFixed(1) +
                '%' },
            { label: 'Cumplimiento identificación segura (%)', key: 'pctIdentificacion',
            fmt: v => (v).toFixed(1) + '%' },
        ];

        rows.forEach(row => {
            html += `<tr><td><strong>${row.label}</strong></td>`;
            sortedQuarters.forEach(q => {
                const qData = quarterData[q];
                let val = qData ? (qData[row.key] !== undefined ? qData[row.key] : 0) : 0;
                html += `<td>${row.fmt(val)}</td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table>
        <button class="btn btn-outline-primary mt-3" onclick="copyTable()"><i class="fas fa-copy me-2"></i> Copiar Tabla</button></div>`;
        container.innerHTML = html;
    }

    function copyTable() {
        const table = document.getElementById('quarterTable');
        if (!table) return;
        const range = document.createRange();
        range.selectNode(table);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('Tabla copiada al portapapeles.');
    }

    // ================================================================
    // GUARDAR REGISTRO
    // ================================================================
    async function saveDailyRecord(e) {
        e.preventDefault();
        const date = document.getElementById('regDate').value;
        if (!date) { alert('Selecciona una fecha.'); return; }
        updateTotal();

        const record = {
            date,
            ward: FIXED_WARD,
            startPatients: parseInt(document.getElementById('startPatients').value) || 0,
            admissions: parseInt(document.getElementById('admissions').value) || 0,
            discharges: parseInt(document.getElementById('discharges').value) || 0,
            totalPatients: parseInt(document.getElementById('totalPatients').value) || 0,
            surgeryDone: parseInt(document.getElementById('surgeryDone').value) || 0,
            surgeryTotal: parseInt(document.getElementById('surgeryTotal').value) || 0,
            registrosCompletos: parseInt(document.getElementById('registrosCompletos').value) || 0,
            totalHistoriasAuditadas: parseInt(document.getElementById('totalHistoriasAuditadas').value) || 0,
            conteoCorrecto: parseInt(document.getElementById('conteoCorrecto').value) || 0,
            totalCirugiasConteo: parseInt(document.getElementById('totalCirugiasConteo').value) || 0,
            higieneManosCorrecta: parseInt(document.getElementById('higieneManosCorrecta').value) || 0,
            totalOportunidadesHigiene: parseInt(document.getElementById('totalOportunidadesHigiene').value) ||
            0,
            posicionamientoCorrecto: parseInt(document.getElementById('posicionamientoCorrecto').value) || 0,
            totalPacientesPosicion: parseInt(document.getElementById('totalPacientesPosicion').value) || 0,
            lppQuirurgico: parseInt(document.getElementById('lppQuirurgico').value) || 0,
            totalPacientesLPP: parseInt(document.getElementById('totalPacientesLPP').value) || 0,
            listaVerificacionRegistrada: parseInt(document.getElementById('listaVerificacionRegistrada')
                .value) || 0,
            totalCirugiasLista: parseInt(document.getElementById('totalCirugiasLista').value) || 0,
            identificacionCorrecta: parseInt(document.getElementById('identificacionCorrecta').value) || 0,
            totalPacientesIdentificacion: parseInt(document.getElementById('totalPacientesIdentificacion')
                .value) || 0,
        };

        const success = await saveData(record);
        if (success) {
            document.getElementById('registerFeedback').innerHTML =
                `<div class="alert alert-success">✅ Registro del día <strong>${date}</strong> guardado en la nube.</div>`;
            await refreshAll();
        } else {
            document.getElementById('registerFeedback').innerHTML =
                `<div class="alert alert-danger">❌ Error al guardar. Revisa la consola.</div>`;
        }
    }

    // ================================================================
    // REFRESH
    // ================================================================
    async function refreshAll() {
        await renderLastEntries();
        await renderUltimoRegistroIndicadores();
        await renderDashboard(FIXED_WARD);
        await renderReport(FIXED_WARD);
    }

    // ================================================================
    // INICIALIZACIÓN
    // ================================================================
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('regWard').value = FIXED_WARD;
        document.getElementById('wardDisplay').innerHTML = `<i class="fas fa-hospital me-1"></i> Centro Quirúrgico`;
        document.querySelector('.alert-fixed strong').textContent = 'Centro Quirúrgico';

        refreshAll();
        updateTotal();

        document.getElementById('dailyForm').addEventListener('submit', saveDailyRecord);
        document.getElementById('regDate').value = new Date().toISOString().split('T')[0];
        ['startPatients', 'admissions', 'discharges'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', updateTotal);
                el.addEventListener('change', updateTotal);
            }
        });

        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        var tooltipList = tooltipTriggerList.map(function(tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });
    });
</script>
