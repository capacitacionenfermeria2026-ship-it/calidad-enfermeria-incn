<script>
    // ================================================================
    // CONFIGURACIÓN SUPABASE
    // ================================================================
    const SUPABASE_URL = 'https://hdhqzawcylkvttsqqjty.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_x5r7hUrN2pzVexbtZ_b0Wg_OBDEMAKP';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const EXCLUDED_WARDS = ['General', 'Jefatura'];

    // ================================================================
    // NORMALIZACIÓN DE NOMBRES DE SALA (SIN TILDES Y UNIFICADA)
    // ================================================================
    function normalizarNombreSala(nombre) {
        if (!nombre) return '';
        let n = nombre.trim();
        // Quitar prefijo "Sala " si existe
        if (n.startsWith('Sala ')) n = n.substring(5);
        // Mapa de equivalencias para nombres especiales (con tilde → sin tilde)
        const mapa = {
            'Corazón de Jesús': 'Corazon de Jesus',
            'Corazon de Jesus': 'Corazon de Jesus',
            'Jesús María': 'Jesus Maria',
            'Jesus Maria': 'Jesus Maria',
            'San José': 'San Jose',
            'San Jose': 'San Jose',
            // Agrega aquí otros nombres que requieran unificación manual
        };
        if (mapa[n]) return mapa[n];
        // Eliminar tildes de forma genérica (para cualquier otro nombre)
        n = n.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        // Capitalizar cada palabra (primera letra mayúscula)
        n = n.toLowerCase().replace(/(?:^|\s)\S/g, function(a) { return a.toUpperCase(); });
        return n;
    }

    // ================================================================
    // SEMÁFORO (UNIFORME)
    // ================================================================
    function obtenerSemaforo(nombre, valor, denominador) {
        if (denominador === 0) return { color: 'status-neutral', texto: 'N/A' };
        const u = {
            'Cobertura LPP': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Incidencia LPP': { verde: 5, amarillo: 12, rojo: 20, invertido: true },
            'Tasa EA (x1000)': { verde: 30, amarillo: 60, rojo: 120, invertido: true },
            'Tasa Caídas (x1000)': { verde: 20, amarillo: 50, rojo: 100, invertido: true },
            'Cumpl. CVC': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumpl. VM': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumpl. CUP': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Flebitis (CVP)': { verde: 5, amarillo: 10, rojo: 20, invertido: true },
            'Cumpl. PAE': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumpl. Glasgow': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Evaluación Wells (TVP)': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Test de Disfagia': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Riesgo de Aspiración': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Incidencia de aspiración en pacientes con riesgo': { verde: 5, amarillo: 10, rojo: 20, invertido: true },
            'Cumplimiento cirugías programadas': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Horas Enfermería (24h)': { verde: 12, amarillo: 8, rojo: 5, invertido: false },
            'Ratio día': { verde: 2, amarillo: 3, rojo: 4, invertido: false },
            'Ratio noche': { verde: 2.5, amarillo: 3.5, rojo: 5, invertido: false },
            'Tasa VAP (x1000)': { verde: 10, amarillo: 20, rojo: 40, invertido: true },
            'Sedación evaluada': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'PIC vigilada': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Retiro CVC/CVP': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Retiro TET': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Retiro SNG/SOG': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Retiro CUP': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Encuestas satisfactorias': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumplimiento registros perioperatorios': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumplimiento conteo instrumental': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumplimiento higiene de manos': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumplimiento posicionamiento seguro': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Incidencia de LPP quirúrgicas': { verde: 2, amarillo: 5, rojo: 10, invertido: true },
            'Cumplimiento Lista de Verificación': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumplimiento identificación segura': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Relación Pac/Enf (global)': { verde: 2, amarillo: 3, rojo: 4, invertido: true },
            'Relación Pac/Enf (DÍA)': { verde: 2, amarillo: 3, rojo: 4, invertido: true },
            'Relación Pac/Enf (NOCHE)': { verde: 2, amarillo: 3, rojo: 4, invertido: true },
            'Tiempo Triaje (min)': { verde: 5, amarillo: 10, rojo: 15, invertido: true },
            'Tiempo Trombólisis (min)': { verde: 30, amarillo: 45, rojo: 60, invertido: true },
            'Tiempo Observación (min)': { verde: 120, amarillo: 180, rojo: 240, invertido: true },
        };
        const umb = u[nombre] || { verde: 90, amarillo: 70, rojo: 50, invertido: false };
        let color, texto;
        if (umb.invertido) {
            if (valor <= umb.verde) { color = 'status-green';
                texto = 'Cumplido'; } else if (valor <= umb.amarillo) { color = 'status-yellow';
                texto = 'En observación'; } else if (valor <= umb.rojo) { color = 'status-yellow';
                texto = 'En observación'; } else { color = 'status-red';
                texto = 'Revisar'; }
        } else {
            if (valor >= umb.verde) { color = 'status-green';
                texto = 'Cumplido'; } else if (valor >= umb.amarillo) { color = 'status-yellow';
                texto = 'En observación'; } else if (valor >= umb.rojo) { color = 'status-yellow';
                texto = 'En observación'; } else { color = 'status-red';
                texto = 'Revisar'; }
        }
        return { color, texto };
    }

    // ================================================================
    // FUNCIONES DE SEGURIDAD PARA GRÁFICOS
    // ================================================================
    function safeDestroy(chartVar) {
        if (chartVar && typeof chartVar.destroy === 'function') {
            chartVar.destroy();
        }
        return null;
    }

    // ================================================================
    // OBTENER DATOS DE TODAS LAS SALAS (CON NORMALIZACIÓN)
    // ================================================================
    async function getDataFromAllWards() {
        const { data, error } = await supabaseClient
            .from("REGISTROS")
            .select("*")
            .order("date", { ascending: true });
        if (error) { console.error(error); return []; }
        return data
            .filter(row => {
                const w = row.ward || '';
                return !EXCLUDED_WARDS.includes(w) && w !== '';
            })
            .map(row => {
                const d = row.data;
                if (d.ward) {
                    // Normalizar nombre de sala (sin tilde)
                    d.ward = normalizarNombreSala(d.ward);
                }
                return d;
            });
    }

    function getWardsAndMonths(records) {
        const wards = new Set();
        const months = new Set();
        records.forEach(r => {
            if (r.ward) wards.add(r.ward);
            if (r.date) months.add(r.date.substring(0, 7));
        });
        return { wards: Array.from(wards).sort(), months: Array.from(months).sort() };
    }

    function filterRecordsByMonth(records, month) {
        return records.filter(r => r.date && r.date.substring(0, 7) === month);
    }

    // ================================================================
    // DETECCIÓN DE TIPO DE SALA SEGÚN CAMPOS PRESENTES
    // ================================================================
    function detectarTipoSala(sum) {
        if (sum.patientsAttendedDay !== undefined) return 'emergencia';
        if (sum.registrosCompletos !== undefined && sum.surgeryDone !== undefined) return 'centro_quirurgico';
        if (sum.surgeryDone !== undefined) return 'quirurgica';
        if (sum.hoursNursing !== undefined) return 'uci';
        if (sum.wellsApplied !== undefined) return 'la_virgen';
        if (sum.aspirationEvent !== undefined) return 'santa_ana';
        if (sum.aspirationRisk !== undefined) return 'jesus_maria';
        return 'comun';
    }

    // ================================================================
    // CÁLCULO DE INDICADORES DE UNA SALA (COMPLETO)
    // ================================================================
    function calcularIndicadoresSala(records, sala) {
        const salaNorm = sala.trim();
        const salaRecords = records.filter(r => r.ward && r.ward === salaNorm);
        if (salaRecords.length === 0) return {};

        const sum = {};
        salaRecords.forEach(r => {
            for (const key in r) {
                if (typeof r[key] === 'number' && key !== 'totalPatients') {
                    if (!sum[key]) sum[key] = 0;
                    sum[key] += r[key];
                }
            }
            if (r.extra) {
                for (const key in r.extra) {
                    if (typeof r.extra[key] === 'number') {
                        if (!sum[key]) sum[key] = 0;
                        sum[key] += r.extra[key];
                    }
                }
            }
        });

        const totalPatients = sum.totalPatients || 0;
        const admissions = sum.admissions || 0;
        const lppEvaluated = sum.lppEvaluated || 0;
        const cvpTotal = sum.cvpTotal || 0;
        const glasgowExpected = sum.consciousnessExpected || 0;

        const indicadores = {};

        // DETECTAR TIPO DE SALA
        const tipo = detectarTipoSala(sum);

        // 1. INDICADORES COMUNES (si la sala los tiene)
        if (tipo !== 'emergencia' && tipo !== 'centro_quirurgico') {
            const comunes = [
                { key: 'coberturaLPP', label: 'Cobertura LPP', num: lppEvaluated, den: admissions, fmt: 'percent' },
                { key: 'incidenciaLPP', label: 'Incidencia LPP', num: sum.lppIncidence || 0, den: totalPatients, fmt: 'percent' },
                { key: 'tasaEA', label: 'Tasa EA (x1000)', num: sum.adverseEvents || 0, den: totalPatients, fmt: 'rate' },
                { key: 'tasaCaidas', label: 'Tasa Caídas (x1000)', num: sum.falls || 0, den: totalPatients, fmt: 'rate' },
                { key: 'cumplimientoCVC', label: 'Cumpl. CVC', num: sum.cvcDone || 0, den: sum.cvcTotal || 0, fmt: 'percent' },
                { key: 'cumplimientoVM', label: 'Cumpl. VM', num: sum.vmDone || 0, den: sum.vmTotal || 0, fmt: 'percent' },
                { key: 'cumplimientoCUP', label: 'Cumpl. CUP', num: sum.cupDone || 0, den: sum.cupTotal || 0, fmt: 'percent' },
                { key: 'incidenciaFlebitis', label: 'Flebitis (CVP)', num: sum.phlebitis || 0, den: cvpTotal, fmt: 'percent' },
                { key: 'cumplimientoPAE', label: 'Cumpl. PAE', num: (sum.paeDay || 0) + (sum.paeNight || 0), den: sum.paeTotal || 0, fmt: 'percent' },
                { key: 'cumplimientoGlasgow', label: 'Cumpl. Glasgow', num: (sum.consciousnessDay || 0) + (sum.consciousnessNight || 0), den: glasgowExpected, fmt: 'percent' },
            ];
            comunes.forEach(ind => {
                let result = 0;
                if (ind.den > 0) {
                    if (ind.fmt === 'percent') result = (ind.num / ind.den) * 100;
                    else if (ind.fmt === 'rate') result = (ind.num / ind.den) * 1000;
                    else result = ind.num / ind.den;
                }
                indicadores[ind.key] = { label: ind.label, numerator: ind.num, denominator: ind.den, result, format: ind.fmt };
            });
        }

        // 2. INDICADORES ESPECÍFICOS (sin cambios)
        if (tipo === 'santa_ana' || tipo === 'jesus_maria') {
            const riskNum = sum.aspirationEvent !== undefined ? sum.aspirationEvent : (sum.aspirationRisk || 0);
            const riskDen = sum.aspirationRiskDen !== undefined ? sum.aspirationRiskDen : (sum.aspirationTotal || 0);
            indicadores['aspirationIncidence'] = {
                label: 'Incidencia de aspiración en pacientes con riesgo',
                numerator: riskNum,
                denominator: riskDen,
                result: riskDen > 0 ? (riskNum / riskDen * 100) : 0,
                format: 'percent'
            };
        }

        if (tipo === 'la_virgen') {
            const wellsNum = sum.wellsApplied || 0;
            const wellsDen = sum.wellsTotal || 0;
            const dysNum = sum.dysphagiaApplied || 0;
            const dysDen = sum.dysphagiaTotal || 0;
            indicadores['wells'] = {
                label: 'Evaluación Wells (TVP)',
                numerator: wellsNum,
                denominator: wellsDen,
                result: wellsDen > 0 ? (wellsNum / wellsDen * 100) : 0,
                format: 'percent'
            };
            indicadores['dysphagia'] = {
                label: 'Test de Disfagia',
                numerator: dysNum,
                denominator: dysDen,
                result: dysDen > 0 ? (dysNum / dysDen * 100) : 0,
                format: 'percent'
            };
        }

        if (tipo === 'quirurgica' || tipo === 'centro_quirurgico') {
            const surgNum = sum.surgeryDone || 0;
            const surgDen = sum.surgeryTotal || 0;
            indicadores['cirugias'] = {
                label: 'Cumplimiento cirugías programadas',
                numerator: surgNum,
                denominator: surgDen,
                result: surgDen > 0 ? (surgNum / surgDen * 100) : 0,
                format: 'percent'
            };
        }

        if (tipo === 'centro_quirurgico') {
            const qxFields = [
                { key: 'qxRegistros', label: 'Cumplimiento registros perioperatorios', num: sum.registrosCompletos || 0, den: sum.totalHistoriasAuditadas || 0, fmt: 'percent' },
                { key: 'qxConteo', label: 'Cumplimiento conteo instrumental', num: sum.conteoCorrecto || 0, den: sum.totalCirugiasConteo || 0, fmt: 'percent' },
                { key: 'qxHigiene', label: 'Cumplimiento higiene de manos', num: sum.higieneManosCorrecta || 0, den: sum.totalOportunidadesHigiene || 0, fmt: 'percent' },
                { key: 'qxPosicion', label: 'Cumplimiento posicionamiento seguro', num: sum.posicionamientoCorrecto || 0, den: sum.totalPacientesPosicion || 0, fmt: 'percent' },
                { key: 'qxLPP', label: 'Incidencia de LPP quirúrgicas', num: sum.lppQuirurgico || 0, den: sum.totalPacientesLPP || 0, fmt: 'percent' },
                { key: 'qxLista', label: 'Cumplimiento Lista de Verificación', num: sum.listaVerificacionRegistrada || 0, den: sum.totalCirugiasLista || 0, fmt: 'percent' },
                { key: 'qxIdentificacion', label: 'Cumplimiento identificación segura', num: sum.identificacionCorrecta || 0, den: sum.totalPacientesIdentificacion || 0, fmt: 'percent' },
            ];
            qxFields.forEach(ind => {
                let result = 0;
                if (ind.den > 0) {
                    if (ind.fmt === 'percent') result = (ind.num / ind.den) * 100;
                    else if (ind.fmt === 'rate') result = (ind.num / ind.den) * 1000;
                    else if (ind.fmt === 'avg') result = ind.num / ind.den;
                    else result = ind.num / ind.den;
                }
                indicadores[ind.key] = { label: ind.label, numerator: ind.num, denominator: ind.den, result, format: ind.fmt };
            });
        }

        if (tipo === 'uci') {
            const uciFields = [
                { key: 'hoursNursing', label: 'Horas Enfermería (24h)', num: sum.hoursNursing || 0, den: sum.hoursNursingDen || 0, fmt: 'avg' },
                { key: 'ratioDay', label: 'Ratio día', num: sum.patientsTurnDay || 0, den: sum.nursesDay || 0, fmt: 'avg' },
                { key: 'ratioNight', label: 'Ratio noche', num: sum.patientsTurnNight || 0, den: sum.nursesNight || 0, fmt: 'avg' },

                }
                indicadores[ind.key] = { label: ind.label, numerator: ind.num, denominator: ind.den, result, format: ind.fmt };

    // ================================================================
    // CONSOLIDAR INDICADORES PARA "TODAS" (SOLO COMUNES)
    // ================================================================
    function consolidarIndicadores(records) {
        const sum = {};
        records.forEach(r => {
            for (const key in r) {
                if (typeof r[key] === 'number' && key !== 'totalPatients') {
                    if (!sum[key]) sum[key] = 0;
                    sum[key] += r[key];
                }
            }
            if (r.extra) {
                for (const key in r.extra) {
                    if (typeof r.extra[key] === 'number') {
                        if (!sum[key]) sum[key] = 0;
                        sum[key] += r.extra[key];
                    }
                }
            }
        });
        const totalPatients = sum.totalPatients || 0;
        const admissions = sum.admissions || 0;
        const lppEvaluated = sum.lppEvaluated || 0;
        const cvpTotal = sum.cvpTotal || 0;
        const glasgowExpected = sum.consciousnessExpected || 0;
        const indicadores = {};
        const comunes = [
            { key: 'coberturaLPP', label: 'Cobertura LPP', num: lppEvaluated, den: admissions, fmt: 'percent' },
            { key: 'incidenciaLPP', label: 'Incidencia LPP', num: sum.lppIncidence || 0, den: totalPatients, fmt: 'percent' },
            { key: 'tasaEA', label: 'Tasa EA (x1000)', num: sum.adverseEvents || 0, den: totalPatients, fmt: 'rate' },
            { key: 'tasaCaidas', label: 'Tasa Caídas (x1000)', num: sum.falls || 0, den: totalPatients, fmt: 'rate' },
            { key: 'cumplimientoCVC', label: 'Cumpl. CVC', num: sum.cvcDone || 0, den: sum.cvcTotal || 0, fmt: 'percent' },
            { key: 'cumplimientoVM', label: 'Cumpl. VM', num: sum.vmDone || 0, den: sum.vmTotal || 0, fmt: 'percent' },
            { key: 'cumplimientoCUP', label: 'Cumpl. CUP', num: sum.cupDone || 0, den: sum.cupTotal || 0, fmt: 'percent' },
            { key: 'incidenciaFlebitis', label: 'Flebitis (CVP)', num: sum.phlebitis || 0, den: cvpTotal, fmt: 'percent' },
            { key: 'cumplimientoPAE', label: 'Cumpl. PAE', num: (sum.paeDay || 0) + (sum.paeNight || 0), den: sum.paeTotal || 0, fmt: 'percent' },
            { key: 'cumplimientoGlasgow', label: 'Cumpl. Glasgow', num: (sum.consciousnessDay || 0) + (sum.consciousnessNight || 0), den: glasgowExpected, fmt: 'percent' },
        ];
        comunes.forEach(ind => {
            let result = 0;
            if (ind.den > 0) {
                if (ind.fmt === 'percent') result = (ind.num / ind.den) * 100;
                else if (ind.fmt === 'rate') result = (ind.num / ind.den) * 1000;
                else result = ind.num / ind.den;
            }
            indicadores[ind.key] = { label: ind.label, numerator: ind.num, denominator: ind.den, result, format: ind.fmt };
        });
        return indicadores;
    }

    // ================================================================
    // OBTENER INDICADORES DISPONIBLES PARA COMPARATIVA
    // ================================================================
    function getAvailableIndicators(records, salaSeleccionada) {
        const map = new Map();
        const processIndicators = (inds) => {
            for (const key in inds) {
                if (!map.has(key)) {
                    map.set(key, { key: key, label: inds[key].label.trim() });
                }
            }
        };
        if (salaSeleccionada === 'Todas') {
            const wards = getWardsAndMonths(records).wards;
            wards.forEach(ward => {
                const inds = calcularIndicadoresSala(records, ward);
                processIndicators(inds);
            });
        } else {
            const inds = calcularIndicadoresSala(records, salaSeleccionada);
            processIndicators(inds);
        }
        const result = Array.from(map.values());
        result.sort((a, b) => a.label.localeCompare(b.label));
        return result;
    }

            const mes = mesSelect.value;
            const salaBase = salaBaseSelect.value;
            const filtered = filterRecordsByMonth(allRecords, mes);
            const available = getAvailableIndicators(filtered, salaBase);
            const current = indicadorSelect.value;

                indicadorSelect.value = indicadorSelect.options[1].value;

        function updateComparativa() {
            const mes = mesSelect.value;
            const indicatorKey = indicadorSelect.value;
            if (!indicatorKey) {
                inner.innerHTML = `<div class="alert alert-info">Selecciona un indicador para ver la comparativa.</div>`;
                return;
            }

            const filtered = filterRecordsByMonth(allRecords, mes);
            const wardsList = getWardsAndMonths(allRecords).wards;

            const data = [];
            wardsList.forEach(ward => {
                const inds = calcularIndicadoresSala(filtered, ward);
                if (inds[indicatorKey]) {
                    const ind = inds[indicatorKey];
                    data.push({
                        ward: ward,
                        label: ind.label || indicatorKey,
                        value: ind.result,
                        numerator: ind.numerator,
                        denominator: ind.denominator,
                        format: ind.format
                    });
                } else {
                    data.push({
                        ward: ward,
                        label: indicatorKey,
                        value: 0,
                        numerator: 0,
                        denominator: 0,
                        format: 'percent'
                    });
                }
            });

            data.sort((a, b) => b.value - a.value);

            let indicatorLabel = indicatorKey;
            let realFormat = 'percent';
            for (const item of data) {
                if (item.label !== indicatorKey) {
                    indicatorLabel = item.label;
                }
                if (item.format) realFormat = item.format;
                break;
            }

            let html = `
                <div class="comparativa-card">
                    <div class="card-header">

                    window.chartComparativa = safeDestroy(window.chartComparativa);
                    try {
                        const labels = data.map(d => d.ward);
                        const values = data.map(d => d.value);
                        const colors = values.map(v => {

                            if (sem.color === 'status-green') return '#28a745';
                            if (sem.color === 'status-yellow') return '#ffc107';
                            if (sem.color === 'status-red') return '#dc3545';
                            return '#6c757d';
                        });
                        window.chartComparativa = new Chart(ctx, {

                                datasets: [{

                                    data: values,
                                    backgroundColor: colors,
                                    borderRadius: 6,
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: { legend: { display: false } },
                                scales: {
                                    y: { beginAtZero: true, title: { display: true, text: realFormat === 'percent' ? '%' : 'Valor' } },
                                    x: { grid: { display: false } }
                                }
                            }
                        });
                    } catch (e) {
                        console.warn('Error al crear gráfico comparativo:', e);
                    }
                }
            }, 400);

        salaBaseSelect.addEventListener('change', function() {

            updateIndicadorOptions();
            setTimeout(updateComparativa, 300);
        });

        document.getElementById('btnActualizarComparativa').addEventListener('click', function() {
            updateIndicadorOptions();
            setTimeout(updateComparativa, 300);
        });

        updateIndicadorOptions();
        setTimeout(updateComparativa, 400);
    }

    // ================================================================
    // RENDER REPORTE TRIMESTRAL
    // ================================================================
    async function renderReport() {
        const container = document.getElementById('reportContent');
        const allRecords = await getDataFromAllWards();
        if (allRecords.length === 0) {
            container.innerHTML = `<div class="alert alert-warning">No hay registros en ninguna sala.</div>`;
            return;
        }
        const { wards } = getWardsAndMonths(allRecords);

        const salaSelect = document.createElement('select');
        salaSelect.id = 'salaSelectReport';
        salaSelect.className = 'form-select me-2';
        salaSelect.style.width = 'auto';
        salaSelect.style.display = 'inline-block';
        salaSelect.innerHTML = `<option value="Todas">🌐 Todas las salas</option>`;
        wards.forEach(w => { salaSelect.innerHTML += `<option value="${w}">${w}</option>`; });

        const filtersDiv = document.createElement('div');
        filtersDiv.className = 'filters-bar d-flex flex-wrap align-items-center gap-3';
        filtersDiv.innerHTML = `
            <label class="fw-bold me-1"><i class="fas fa-hospital"></i> Sala:</label>
            <span id="salaSelectReportContainer"></span>
            <button id="btnActualizarReport" class="btn btn-primary btn-sm"><i class="fas fa-sync me-1"></i> Actualizar</button>
        `;
        container.innerHTML = '';
        container.appendChild(filtersDiv);
        document.getElementById('salaSelectReportContainer').appendChild(salaSelect);

        const inner = document.createElement('div');
        inner.id = 'reportContentInner';
        container.appendChild(inner);

        function updateReport() {
            const sala = salaSelect.value;
            let records = allRecords;
            if (sala !== 'Todas') {
                records = allRecords.filter(r => r.ward && r.ward === sala);
            }
            if (records.length === 0) {
                inner.innerHTML = `<div class="alert alert-warning">No hay registros para ${sala === 'Todas' ? 'todas las salas' : sala}.</div>`;
                return;
            }

            function getQuarter(m) {
                const mo = parseInt(m.split('-')[1]);
                if (mo <= 3) return 'Trim I';
                if (mo <= 6) return 'Trim II';
                if (mo <= 9) return 'Trim III';
                return 'Trim IV';
            }

            const quarters = {};
            records.forEach(d => {
                const key = d.date.substring(0, 7);
                const q = getQuarter(key);
                if (!quarters[q]) quarters[q] = [];
                quarters[q].push(d);
            });

            const sortedQuarters = ['Trim I', 'Trim II', 'Trim III', 'Trim IV'];
            const quarterData = {};
            sortedQuarters.forEach(q => {
                const recs = quarters[q] || [];
                if (recs.length === 0) { quarterData[q] = null; return; }
                const sum = {};
                recs.forEach(r => {
                    for (const key in r) {
                        if (typeof r[key] === 'number' && key !== 'totalPatients') {
                            if (!sum[key]) sum[key] = 0;
                            sum[key] += r[key];
                        }
                    }
                    if (r.extra) {
                        for (const key in r.extra) {
                            if (typeof r.extra[key] === 'number') {
                                if (!sum[key]) sum[key] = 0;
                                sum[key] += r.extra[key];
                            }
                        }
                    }
                });
                const totalPatients = sum.totalPatients || 0;
                const admissions = sum.admissions || 0;
                const lppEvaluated = sum.lppEvaluated || 0;
                const cvpTotal = sum.cvpTotal || 0;
                const glasgowExpected = sum.consciousnessExpected || 0;

                const ind = {
                    totalPatients,
                    coberturaLPP: admissions > 0 ? (lppEvaluated / admissions * 100) : 0,
                    incidenciaLPP: totalPatients > 0 ? ((sum.lppIncidence || 0) / totalPatients * 100) : 0,
                    tasaEA: totalPatients > 0 ? ((sum.adverseEvents || 0) / totalPatients * 1000) : 0,
                    tasaCaidas: totalPatients > 0 ? ((sum.falls || 0) / totalPatients * 1000) : 0,
                    cumplimientoCVC: (sum.cvcTotal || 0) > 0 ? ((sum.cvcDone || 0) / (sum.cvcTotal || 0) * 100) : 0,
                    cumplimientoVM: (sum.vmTotal || 0) > 0 ? ((sum.vmDone || 0) / (sum.vmTotal || 0) * 100) : 0,
                    cumplimientoCUP: (sum.cupTotal || 0) > 0 ? ((sum.cupDone || 0) / (sum.cupTotal || 0) * 100) : 0,
                    incidenciaFlebitis: cvpTotal > 0 ? ((sum.phlebitis || 0) / cvpTotal * 100) : 0,
                    cumplimientoPAE: (sum.paeTotal || 0) > 0 ? (((sum.paeDay || 0) + (sum.paeNight || 0)) / (sum.paeTotal || 0) * 100) : 0,
                    cumplimientoGlasgow: glasgowExpected > 0 ? (((sum.consciousnessDay || 0) + (sum.consciousnessNight || 0)) / glasgowExpected * 100) : 0,
                };

                // Específicos según la sala (solo si no es "Todas")
                if (sala !== 'Todas') {
                    const tipo = detectarTipoSala(sum);
                    if (tipo === 'santa_ana' || tipo === 'jesus_maria') {
                        const riskNum = sum.aspirationEvent !== undefined ? sum.aspirationEvent : (sum.aspirationRisk || 0);
                        const riskDen = sum.aspirationRiskDen !== undefined ? sum.aspirationRiskDen : (sum.aspirationTotal || 0);
                        ind.aspirationIncidence = riskDen > 0 ? (riskNum / riskDen * 100) : 0;
                    }
                    if (tipo === 'la_virgen') {
                        ind.wells = (sum.wellsTotal || 0) > 0 ? ((sum.wellsApplied || 0) / (sum.wellsTotal || 0) * 100) : 0;
                        ind.dysphagia = (sum.dysphagiaTotal || 0) > 0 ? ((sum.dysphagiaApplied || 0) / (sum.dysphagiaTotal || 0) * 100) : 0;
                    }
                    if (tipo === 'quirurgica' || tipo === 'centro_quirurgico') {
                        ind.cirugias = (sum.surgeryTotal || 0) > 0 ? ((sum.surgeryDone || 0) / (sum.surgeryTotal || 0) * 100) : 0;
                    }
                    if (tipo === 'centro_quirurgico') {
                        ind.qxRegistros = (sum.totalHistoriasAuditadas || 0) > 0 ? ((sum.registrosCompletos || 0) / (sum.totalHistoriasAuditadas || 0) * 100) : 0;
                        ind.qxConteo = (sum.totalCirugiasConteo || 0) > 0 ? ((sum.conteoCorrecto || 0) / (sum.totalCirugiasConteo || 0) * 100) : 0;
                        ind.qxHigiene = (sum.totalOportunidadesHigiene || 0) > 0 ? ((sum.higieneManosCorrecta || 0) / (sum.totalOportunidadesHigiene || 0) * 100) : 0;
                        ind.qxPosicion = (sum.totalPacientesPosicion || 0) > 0 ? ((sum.posicionamientoCorrecto || 0) / (sum.totalPacientesPosicion || 0) * 100) : 0;
                        ind.qxLPP = (sum.totalPacientesLPP || 0) > 0 ? ((sum.lppQuirurgico || 0) / (sum.totalPacientesLPP || 0) * 100) : 0;
                        ind.qxLista = (sum.totalCirugiasLista || 0) > 0 ? ((sum.listaVerificacionRegistrada || 0) / (sum.totalCirugiasLista || 0) * 100) : 0;
                        ind.qxIdentificacion = (sum.totalPacientesIdentificacion || 0) > 0 ? ((sum.identificacionCorrecta || 0) / (sum.totalPacientesIdentificacion || 0) * 100) : 0;
                    }
                    if (tipo === 'uci') {
                        ind.horasEnfermeria = (sum.hoursNursingDen || 0) > 0 ? ((sum.hoursNursing || 0) / (sum.hoursNursingDen || 0)) : 0;
                        ind.ratioDay = (sum.nursesDay || 0) > 0 ? ((sum.patientsTurnDay || 0) / (sum.nursesDay || 0)) : 0;
                        ind.ratioNight = (sum.nursesNight || 0) > 0 ? ((sum.patientsTurnNight || 0) / (sum.nursesNight || 0)) : 0;
                        ind.tasaVAP = (sum.vmDays || 0) > 0 ? ((sum.vapCases || 0) / (sum.vmDays || 0) * 1000) : 0;
                        ind.sedacion = (sum.sedationTotal || 0) > 0 ? ((sum.sedationEvaluated || 0) / (sum.sedationTotal || 0) * 100) : 0;
                        ind.pic = (sum.picTotal || 0) > 0 ? ((sum.picRegistered || 0) / (sum.picTotal || 0) * 100) : 0;
                        ind.retiroCvc = (sum.pacCvc || 0) > 0 ? ((sum.raCvc || 0) / (sum.pacCvc || 0) * 100) : 0;
                        ind.retiroTet = (sum.pacTet || 0) > 0 ? ((sum.raTet || 0) / (sum.pacTet || 0) * 100) : 0;
                        ind.retiroSng = (sum.pacSng || 0) > 0 ? ((sum.raSng || 0) / (sum.pacSng || 0) * 100) : 0;
                        ind.retiroCup = (sum.pacCup || 0) > 0 ? ((sum.raCup || 0) / (sum.pacCup || 0) * 100) : 0;
                        ind.encuestas = (sum.surveyApplied || 0) > 0 ? ((sum.surveySatisfied || 0) / (sum.surveyApplied || 0) * 100) : 0;
                    }
                    if (tipo === 'emergencia') {
                        const totalPacientesTurno = (sum.patientsAttendedDay || 0) + (sum.patientsAttendedNight || 0);
                        const totalEnfermerasTurno = (sum.nursesScheduledDay || 0) + (sum.nursesScheduledNight || 0);
                        ind.emerRelGlobal = totalEnfermerasTurno > 0 ? (totalPacientesTurno / totalEnfermerasTurno) : 0;
                        ind.emerRelDia = (sum.nursesScheduledDay || 0) > 0 ? ((sum.patientsAttendedDay || 0) / (sum.nursesScheduledDay || 0)) : 0;
                        ind.emerRelNoche = (sum.nursesScheduledNight || 0) > 0 ? ((sum.patientsAttendedNight || 0) / (sum.nursesScheduledNight || 0)) : 0;
                        ind.emerGlasgow = (sum.glasgowTotal || 0) > 0 ? ((sum.glasgowComplete || 0) / (sum.glasgowTotal || 0) * 100) : 0;
                        ind.emerTriage = (sum.patientsTriaged || 0) > 0 ? ((sum.timeTriageSum || 0) / (sum.patientsTriaged || 0)) : 0;
                        ind.emerThrombo = (sum.thrombolysedPatients || 0) > 0 ? ((sum.timeThrombolysisSum || 0) / (sum.thrombolysedPatients || 0)) : 0;
                        ind.emerFalls = (sum.emergencyTotalPatients || 0) > 0 ? ((sum.emergencyFalls || 0) / (sum.emergencyTotalPatients || 0) * 100) : 0;
                        ind.emerPAE = (sum.paeTotal || 0) > 0 ? (((sum.paeDay || 0) + (sum.paeNight || 0)) / (sum.paeTotal || 0) * 100) : 0;
                        ind.emerObs = (sum.obsPatients || 0) > 0 ? ((sum.obsStaySum || 0) / (sum.obsPatients || 0)) : 0;
                        ind.emerAspiration = (sum.aspirationTotal || 0) > 0 ? ((sum.aspirationRisk || 0) / (sum.aspirationTotal || 0) * 100) : 0;
                        ind.emerConciencia = (sum.emergencyTotalPatients || 0) > 0 ? ((sum.consciousness || 0) / (sum.emergencyTotalPatients || 0) * 100) : 0;
                    }
                }
                quarterData[q] = ind;
            });

            let html = `<h4>Reporte Trimestral - ${sala === 'Todas' ? 'Todas las salas' : sala}</h4>
                <div class="table-responsive"><table class="table table-bordered table-striped table-indicators" id="quarterTable">
                    <thead><tr><th>Indicador</th>${sortedQuarters.map(q => `<th>${q}</th>`).join('')}</tr></thead><tbody>`;

            const rows = [
                { label: 'Pacientes-día', key: 'totalPatients', fmt: v => v },
                { label: 'Cobertura LPP', key: 'coberturaLPP', fmt: v => (v).toFixed(1)+'%' },
                { label: 'Incidencia LPP', key: 'incidenciaLPP', fmt: v => (v).toFixed(1)+'%' },
                { label: 'Tasa EA (x1000)', key: 'tasaEA', fmt: v => (v).toFixed(1) },
                { label: 'Tasa Caídas (x1000)', key: 'tasaCaidas', fmt: v => (v).toFixed(1) },
                { label: 'Cumpl. CVC', key: 'cumplimientoCVC', fmt: v => (v).toFixed(1)+'%' },
                { label: 'Cumpl. VM', key: 'cumplimientoVM', fmt: v => (v).toFixed(1)+'%' },
                { label: 'Cumpl. CUP', key: 'cumplimientoCUP', fmt: v => (v).toFixed(1)+'%' },
                { label: 'Flebitis (CVP)', key: 'incidenciaFlebitis', fmt: v => (v).toFixed(1)+'%' },
                { label: 'Cumpl. PAE', key: 'cumplimientoPAE', fmt: v => (v).toFixed(1)+'%' },
                { label: 'Cumpl. Glasgow', key: 'cumplimientoGlasgow', fmt: v => (v).toFixed(1)+'%' },
            ];

            if (sala !== 'Todas') {
                const sumTemp = {};
                records.forEach(r => {
                    for (const key in r) {
                        if (typeof r[key] === 'number' && key !== 'totalPatients') {
                            if (!sumTemp[key]) sumTemp[key] = 0;
                            sumTemp[key] += r[key];
                        }
                    }
                    if (r.extra) {
                        for (const key in r.extra) {
                            if (typeof r.extra[key] === 'number') {
                                if (!sumTemp[key]) sumTemp[key] = 0;
                                sumTemp[key] += r.extra[key];
                            }
                        }
                    }
                });
                const tipoReal = detectarTipoSala(sumTemp);
                if (tipoReal === 'santa_ana' || tipoReal === 'jesus_maria') {
                    rows.push({ label: 'Incidencia de aspiración en pacientes con riesgo', key: 'aspirationIncidence', fmt: v => (v).toFixed(1)+'%' });
                }
                if (tipoReal === 'la_virgen') {
                    rows.push({ label: 'Evaluación Wells (TVP)', key: 'wells', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Test de Disfagia', key: 'dysphagia', fmt: v => (v).toFixed(1)+'%' });
                }
                if (tipoReal === 'quirurgica' || tipoReal === 'centro_quirurgico') {
                    rows.push({ label: 'Cumpl. cirugías programadas', key: 'cirugias', fmt: v => (v).toFixed(1)+'%' });
                }
                if (tipoReal === 'centro_quirurgico') {
                    rows.push({ label: 'Cumpl. registros perioperatorios', key: 'qxRegistros', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Cumpl. conteo instrumental', key: 'qxConteo', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Cumpl. higiene de manos', key: 'qxHigiene', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Cumpl. posicionamiento seguro', key: 'qxPosicion', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Incid. LPP quirúrgicas', key: 'qxLPP', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Cumpl. Lista Verificación', key: 'qxLista', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Cumpl. identificación segura', key: 'qxIdentificacion', fmt: v => (v).toFixed(1)+'%' });
                }
                if (tipoReal === 'uci') {
                    rows.push({ label: 'Horas Enfermería (h/pac)', key: 'horasEnfermeria', fmt: v => (v).toFixed(1) });
                    rows.push({ label: 'Ratio día', key: 'ratioDay', fmt: v => (v).toFixed(1) });
                    rows.push({ label: 'Ratio noche', key: 'ratioNight', fmt: v => (v).toFixed(1) });
                    rows.push({ label: 'Tasa VAP (x1000)', key: 'tasaVAP', fmt: v => (v).toFixed(1) });
                    rows.push({ label: 'Sedación evaluada', key: 'sedacion', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'PIC vigilada', key: 'pic', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Retiro CVC/CVP', key: 'retiroCvc', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Retiro TET', key: 'retiroTet', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Retiro SNG/SOG', key: 'retiroSng', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Retiro CUP', key: 'retiroCup', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Encuestas satisfactorias', key: 'encuestas', fmt: v => (v).toFixed(1)+'%' });
                }
                if (tipoReal === 'emergencia') {
                    rows.push({ label: 'Relación Pac/Enf (global)', key: 'emerRelGlobal', fmt: v => (v).toFixed(1)+':1' });
                    rows.push({ label: 'Relación Pac/Enf (DÍA)', key: 'emerRelDia', fmt: v => (v).toFixed(1)+':1' });
                    rows.push({ label: 'Relación Pac/Enf (NOCHE)', key: 'emerRelNoche', fmt: v => (v).toFixed(1)+':1' });
                    rows.push({ label: 'Cumpl. Glasgow', key: 'emerGlasgow', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Tiempo Triaje (min)', key: 'emerTriage', fmt: v => (v).toFixed(1) });
                    rows.push({ label: 'Tiempo Trombólisis (min)', key: 'emerThrombo', fmt: v => (v).toFixed(1) });
                    rows.push({ label: 'Incid. Caídas', key: 'emerFalls', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Cumpl. PAE', key: 'emerPAE', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Tiempo Observación (min)', key: 'emerObs', fmt: v => (v).toFixed(1) });
                    rows.push({ label: 'Riesgo de Aspiración', key: 'emerAspiration', fmt: v => (v).toFixed(1)+'%' });
                    rows.push({ label: 'Evaluación Conciencia', key: 'emerConciencia', fmt: v => (v).toFixed(1)+'%' });
                }
            }

            rows.forEach(row => {
                html += `<tr><td><strong>${row.label}</strong></td>`;
                sortedQuarters.forEach(q => {
                    const qData = quarterData[q];
                    let val = qData ? (qData[row.key] !== undefined ? qData[row.key] : 0) : 0;
                    html += `<td>${row.fmt(val)}</td>`;
                });
                html += `</tr>`;
            });

            html += `</tbody></table>
                <button class="btn btn-outline-primary mt-3" onclick="copyTable()"><i class="fas fa-copy me-2"></i> Copiar Tabla</button></div>`;
            inner.innerHTML = html;
        }

        salaSelect.addEventListener('change', updateReport);
        document.getElementById('btnActualizarReport').addEventListener('click', updateReport);
        updateReport();
    }

    function copyTable() {
        const table = document.getElementById('quarterTable');
        if (!table) return;
        const range = document.createRange();
        range.selectNode(table);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('Tabla copiada al portapapeles.');
    }

    // ================================================================
    // INICIALIZACIÓN
    // ================================================================
    document.addEventListener('DOMContentLoaded', async function() {
        document.getElementById('wardDisplay').innerHTML = `<i class="fas fa-chart-line me-1"></i> Jefatura (General)`;

        await renderDashboard();
        await renderComparativa();
        await renderReport();

        document.querySelector('#dashboard-tab')?.click();

        document.querySelectorAll('#myTab .nav-link').forEach(tab => {
            tab.addEventListener('shown.bs.tab', function(e) {
                const target = this.getAttribute('data-bs-target');
                if (target === '#comparativa') renderComparativa();
                if (target === '#report') renderReport();
                if (target === '#dashboard') renderDashboard();
            });
        });
    });
</script>
</body>
