  <style>
    /* ===== ESTILOS (con semáforo) ===== */

<div class="container mt-4">
  <div class="alert-fixed">
    <i class="fas fa-lock"></i> Sala fija: <strong>Emergencia</strong> – Los datos son privados para esta sala.
  </div>

  <ul class="nav nav-tabs" id="myTab" role="tablist">
    <li class="nav-item"><button class="nav-link active" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab"><i class="fas fa-pen me-2"></i>Registro Diario</button></li>

  <div class="tab-content" id="myTabContent">
    <!-- REGISTRO DIARIO -->
    <div class="tab-pane fade show active" id="register" role="tabpanel">
      <div class="card">
        <div class="card-header"><i class="fas fa-calendar-day"></i> Registrar Datos del Día</div>
        <div class="card-body">
          <form id="dailyForm">
            <div class="row g-3">
              <div class="col-md-3">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" id="regDate" required>
              </div>
              <input type="hidden" id="regWard" value="Emergencia">

              <!-- ========================================= -->
              <!-- RELACIÓN PACIENTE/ENFERMERA (DÍA Y NOCHE) -->
              <!-- ========================================= -->
              <div class="col-md-3">
                <label class="form-label">
                  Pacientes atendidos turno DÍA
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Pacientes atendidos en el turno de día (12 horas)."></i>
                </label>
                <input type="number" class="form-control" id="patientsAttendedDay" value="0" min="0" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">
                  Enfermeras programadas turno DÍA
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Enfermeras que trabajaron en el turno de día."></i>
                </label>
                <input type="number" class="form-control" id="nursesScheduledDay" value="0" min="0" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">
                  Pacientes atendidos turno NOCHE
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Pacientes atendidos en el turno de noche (12 horas)."></i>
                </label>
                <input type="number" class="form-control" id="patientsAttendedNight" value="0" min="0" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">
                  Enfermeras programadas turno NOCHE
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Enfermeras que trabajaron en el turno de noche."></i>
                </label>
                <input type="number" class="form-control" id="nursesScheduledNight" value="0" min="0" required>
              </div>

              <!-- ========================================= -->
              <!-- INDICADOR: CUMPLIMIENTO GLASGOW           -->
              <!-- ========================================= -->
              <div class="col-md-3">
                <label class="form-label">
                  Número de pacientes con registro completo de EG
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Pacientes a los que se les aplicó y registró la escala de Glasgow completa."></i>
                </label>
                <input type="number" class="form-control" id="glasgowComplete" value="0" min="0">
              </div>
              <div class="col-md-3">
                <label class="form-label">
                  Total de pacientes con compromiso neurológico atendidos
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Pacientes que presentaron algún compromiso neurológico y requirieron evaluación con Glasgow."></i>
                </label>
                <input type="number" class="form-control" id="glasgowTotal" value="0" min="0">
              </div>

              <!-- ========================================= -->
              <!-- INDICADOR: TIEMPO PUERTA‑TRIAJE (POR PACIENTE) -->
              <!-- ========================================= -->
              <div class="col-md-6">
                <label class="form-label">
                  Tiempos de Triaje (minutos, separados por comas)
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Ejemplo: 5, 8, 3, 12. Ingrese el tiempo de cada paciente."></i>
                </label>
                <input type="text" class="form-control" id="tiemposTriaje" placeholder="Ej: 5, 8, 3, 12" value="">
              </div>

              <!-- ========================================= -->
              <!-- INDICADOR: TIEMPO PUERTA‑TROMBÓLISIS (POR PACIENTE) -->
              <!-- ========================================= -->
              <div class="col-md-6">
                <label class="form-label">
                  Tiempos de Trombólisis (minutos, separados por comas)
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Ejemplo: 25, 30, 45. Ingrese el tiempo de cada paciente trombolizado."></i>
                </label>
                <input type="text" class="form-control" id="tiemposTrombolisis" placeholder="Ej: 25, 30, 45" value="">
              </div>

              <!-- ========================================= -->
              <!-- INDICADOR: TIEMPO ESTANCIA OBSERVACIÓN (POR PACIENTE) -->
              <!-- ========================================= -->
              <div class="col-md-6">
                <label class="form-label">
                  Tiempos de Observación (minutos, separados por comas)
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Ejemplo: 180, 120, 240. Ingrese el tiempo de estancia de cada paciente en Observación."></i>
                </label>
                <input type="text" class="form-control" id="tiemposObservacion" placeholder="Ej: 180, 120, 240" value="">
              </div>

              <!-- ========================================= -->
              <!-- INDICADOR: INCIDENCIA DE CAÍDAS           -->
              <!-- ========================================= -->
              <div class="col-md-3">
                <label class="form-label">
                  Número de pacientes que presentaron caída en Emergencia
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Pacientes que sufrieron una caída dentro del servicio de Emergencia en este turno o período."></i>
                </label>
                <input type="number" class="form-control" id="emergencyFalls" value="0" min="0">
              </div>
              <div class="col-md-3">
                <label class="form-label">
                  Total de pacientes atendidos en Emergencia (24h)
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Número TOTAL de pacientes atendidos en Emergencia durante TODO el día (24 horas). Se usa como denominador para varios indicadores."></i>
                </label>
                <input type="number" class="form-control" id="emergencyTotalPatients" value="0" min="0">
              </div>

              <!-- ========================================= -->
              <!-- INDICADOR: PAE                            -->
              <!-- ========================================= -->
              <div class="col-md-3">
                <label class="form-label" style="color:#17a2b8;">PAE DÍA</label>
                <input type="number" class="form-control" id="paeDay" value="0" min="0">
              </div>
              <div class="col-md-3">
                <label class="form-label" style="color:#6f42c1;">PAE NOCHE</label>
                <input type="number" class="form-control" id="paeNight" value="0" min="0">
              </div>
              <div class="col-md-3">
                <label class="form-label">
                  Total de Registros de PAE evaluados
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Número total de PAE (Proceso de Atención de Enfermería) evaluados en el período (día y noche)."></i>
                </label>
                <input type="number" class="form-control" id="paeTotal" value="0" min="0">
              </div>

              <!-- ========================================= -->
              <!-- INDICADOR: EVALUACIÓN CONCIENCIA          -->
              <!-- ========================================= -->
              <div class="col-md-3">
                <label class="form-label">
                  Número de pacientes con evaluación de Conciencia
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Número de pacientes a los que se les evaluó el nivel de conciencia (ej: escala AVDN). Denominador = Total pacientes atendidos en Emergencia (24h)."></i>
                </label>
                <input type="number" class="form-control" id="consciousness" value="0" min="0">
              </div>

              <!-- ========================================= -->
              <!-- INDICADOR: RIESGO DE ASPIRACIÓN           -->
              <!-- ========================================= -->
              <div class="col-md-3">
                <label class="form-label">
                  N° de pacientes hospitalizados con riesgo que presentan aspiración
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Pacientes con riesgo de aspiración que efectivamente presentaron un evento de aspiración."></i>
                </label>
                <input type="number" class="form-control" id="aspirationRisk" value="0" min="0">
              </div>
              <div class="col-md-3">
                <label class="form-label">
                  Total de pacientes hospitalizados con riesgo de aspiración
                  <i class="fas fa-question-circle help-icon" data-bs-toggle="tooltip" title="Pacientes identificados con riesgo de aspiración (ej: disfagia, sonda nasogástrica, etc.)."></i>
                </label>
                <input type="number" class="form-control" id="aspirationTotal" value="0" min="0">
              </div>

              <div id="extraFieldsContainer" class="row g-3 mt-2 extra-fields-container"></div>

              <div class="col-12 mt-3">
                <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save me-2"></i> Guardar Registro</button>
              </div>
            </div>
          </form>
          <div id="registerFeedback" class="mt-3"></div>
        </div>
      </div>

      <div class="card mt-3">
        <div class="card-header"><i class="fas fa-table me-2"></i>Indicadores del último registro</div>
        <div class="card-body" id="ultimoRegistroIndicadores" style="max-height: 400px; overflow-y: auto;">
          <p class="text-muted">Aún no hay registros.</p>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><i class="fas fa-history"></i> Últimos Registros</div>
        <div class="card-body" id="lastEntries" style="max-height: 300px; overflow-y: auto;"><p class="text-muted">Aún no hay registros.</p></div>
      </div>

    <!-- DASHBOARD -->
    <div class="tab-pane fade" id="dashboard" role="tabpanel">
      <div id="dashboardContent"><div class="alert alert-info">Cargando indicadores...</div></div>
    </div>

    <!-- REPORTE -->
    <div class="tab-pane fade" id="report" role="tabpanel">
      <div id="reportContent"><div class="alert alert-info">Cargando reporte...</div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ================================================================
  // CONFIGURACIÓN SUPABASE
  // ================================================================
  const SUPABASE_URL = 'https://hdhqzawcylkvttsqqjty.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_x5r7hUrN2pzVexbtZ_b0Wg_OBDEMAKP';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const FIXED_WARD = 'Emergencia';

  // ================================================================
  // FUNCIÓN PARA PROCESAR TIEMPOS SEPARADOS POR COMAS
  // ================================================================
  function procesarTiempos(texto) {
    if (!texto || texto.trim() === '') {
      return { suma: 0, cantidad: 0 };
    }
    const numeros = texto.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n) && n > 0);
    if (numeros.length === 0) {
      return { suma: 0, cantidad: 0 };
    }
    const suma = numeros.reduce((a, b) => a + b, 0);
    return { suma, cantidad: numeros.length };
  }

  // ================================================================
  // SEMÁFORO (UNIFORME CON LAS DEMÁS SALAS)
  // ================================================================
  function obtenerSemaforo(nombre, valor, denominador) {
    if (denominador === 0) {
      return { color: 'status-neutral', texto: 'N/A' };
    }

    const umbrales = {
      'Relación Pac/Enf (global)': { verde: 2, amarillo: 3, rojo: 4, invertido: true },
      'Relación Pac/Enf (DÍA)': { verde: 2, amarillo: 3, rojo: 4, invertido: true },
      'Relación Pac/Enf (NOCHE)': { verde: 2, amarillo: 3, rojo: 4, invertido: true },
      'Cumplimiento Glasgow': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
      'Tiempo Triaje (min)': { verde: 5, amarillo: 10, rojo: 15, invertido: true },
      'Tiempo Trombólisis (min)': { verde: 30, amarillo: 45, rojo: 60, invertido: true },
      'Incidencia Caídas': { verde: 2, amarillo: 5, rojo: 10, invertido: true },
      'Cumplimiento PAE': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
      'Tiempo Observación (min)': { verde: 120, amarillo: 180, rojo: 240, invertido: true },
      'Riesgo de Aspiración': { verde: 5, amarillo: 10, rojo: 20, invertido: true },
      'Evaluación Conciencia': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
    };

    const u = umbrales[nombre] || { verde: 90, amarillo: 70, rojo: 50, invertido: false };
    let color, texto;

    if (u.invertido) {
      if (valor <= u.verde) { color = 'status-green';
        texto = 'Cumplido'; } else if (valor <= u.amarillo) { color = 'status-yellow';
        texto = 'En observación'; } else if (valor <= u.rojo) { color = 'status-yellow';
        texto = 'En observación'; } else { color = 'status-red';
        texto = 'Revisar'; }
    } else {
      if (valor >= u.verde) { color = 'status-green';
        texto = 'Cumplido'; } else if (valor >= u.amarillo) { color = 'status-yellow';
        texto = 'En observación'; } else if (valor >= u.rojo) { color = 'status-yellow';
        texto = 'En observación'; } else { color = 'status-red';
        texto = 'Revisar'; }
    }

    return { color, texto };
  }

  // ================================================================
  // GESTIÓN DE DATOS (FULL SUPABASE)
  // ================================================================
  async function getData() {
    const { data, error } = await supabaseClient
      .from("REGISTROS")
      .select("*")
      .eq("ward", FIXED_WARD)
      .order("date", { ascending: true });
    if (error) { console.error(error); return []; }
    return data.map(row => row.data);
  }

  async function saveData(record) {
    const { data: existing, error: checkError } = await supabaseClient
      .from("REGISTROS")
      .select("id")
      .eq("date", record.date)
      .eq("ward", FIXED_WARD)
      .maybeSingle();
    if (checkError) { console.error(checkError); alert("Error de verificación"); return false; }
    if (existing) {
      const { error } = await supabaseClient
        .from("REGISTROS")
        .update({ data: record })
        .eq("id", existing.id);
      if (error) { console.error(error); alert("Error al actualizar"); return false; }
    } else {
      const { error } = await supabaseClient
        .from("REGISTROS")
        .insert({ date: record.date, ward: FIXED_WARD, data: record });
      if (error) { console.error(error); alert("Error al insertar"); return false; }
    }
    return true;
  }

  // ================================================================
  // FUNCIONES AUXILIARES
  // ================================================================
  function renderExtraFields() {
    document.getElementById('extraFieldsContainer').innerHTML = '<div class="col-12 text-muted">No hay indicadores adicionales.</div>';
  }

  // ================================================================
  // CALCULAR INDICADORES DE UN REGISTRO
  // ================================================================
  function calcularIndicadores(record) {
    const indicadores = {};

    const totalPacientesTurno = (record.patientsAttendedDay || 0) + (record.patientsAttendedNight || 0);
    const totalEnfermerasTurno = (record.nursesScheduledDay || 0) + (record.nursesScheduledNight || 0);

    const relPacEnf = totalEnfermerasTurno > 0 ? (totalPacientesTurno / totalEnfermerasTurno) : 0;
    indicadores.relPacEnf = { label: 'Relación Pac/Enf (global)', numerator: totalPacientesTurno, denominator: totalEnfermerasTurno, result: relPacEnf, format: 'ratio' };

    const relPacEnfDia = record.nursesScheduledDay > 0 ? (record.patientsAttendedDay / record.nursesScheduledDay) : 0;
    indicadores.relPacEnfDia = { label: 'Relación Pac/Enf (DÍA)', numerator: record.patientsAttendedDay || 0, denominator: record.nursesScheduledDay || 0, result: relPacEnfDia, format: 'ratio' };

    const relPacEnfNoche = record.nursesScheduledNight > 0 ? (record.patientsAttendedNight / record.nursesScheduledNight) : 0;
    indicadores.relPacEnfNoche = { label: 'Relación Pac/Enf (NOCHE)', numerator: record.patientsAttendedNight || 0, denominator: record.nursesScheduledNight || 0, result: relPacEnfNoche, format: 'ratio' };

    const pctGlasgow = record.glasgowTotal > 0 ? (record.glasgowComplete / record.glasgowTotal * 100) : 0;
    indicadores.pctGlasgow = { label: 'Cumplimiento Glasgow', numerator: record.glasgowComplete || 0, denominator: record.glasgowTotal || 0, result: pctGlasgow, format: 'percent' };

    const avgTriage = record.patientsTriaged > 0 ? (record.timeTriageSum / record.patientsTriaged) : 0;
    indicadores.avgTriage = { label: 'Tiempo Triaje (min)', numerator: record.timeTriageSum || 0, denominator: record.patientsTriaged || 0, result: avgTriage, format: 'avg' };

    const avgThrombo = record.thrombolysedPatients > 0 ? (record.timeThrombolysisSum / record.thrombolysedPatients) : 0;
    indicadores.avgThrombo = { label: 'Tiempo Trombólisis (min)', numerator: record.timeThrombolysisSum || 0, denominator: record.thrombolysedPatients || 0, result: avgThrombo, format: 'avg' };

    const pctFalls = record.emergencyTotalPatients > 0 ? (record.emergencyFalls / record.emergencyTotalPatients * 100) : 0;
    indicadores.pctFalls = { label: 'Incidencia Caídas', numerator: record.emergencyFalls || 0, denominator: record.emergencyTotalPatients || 0, result: pctFalls, format: 'percent' };

    const paeExec = (record.paeDay || 0) + (record.paeNight || 0);
    const pctPAE = record.paeTotal > 0 ? (paeExec / record.paeTotal * 100) : 0;
    indicadores.pctPAE = { label: 'Cumplimiento PAE', numerator: paeExec, denominator: record.paeTotal || 0, result: pctPAE, format: 'percent' };
    indicadores.paeDay = { label: 'PAE Día', numerator: record.paeDay || 0, denominator: 1, result: record.paeDay || 0, format: 'count' };
    indicadores.paeNight = { label: 'PAE Noche', numerator: record.paeNight || 0, denominator: 1, result: record.paeNight || 0, format: 'count' };

    const avgObs = record.obsPatients > 0 ? (record.obsStaySum / record.obsPatients) : 0;
    indicadores.avgObs = { label: 'Tiempo Observación (min)', numerator: record.obsStaySum || 0, denominator: record.obsPatients || 0, result: avgObs, format: 'avg' };

    const pctAspiration = record.aspirationTotal > 0 ? (record.aspirationRisk / record.aspirationTotal * 100) : 0;
    indicadores.pctAspiration = { label: 'Riesgo de Aspiración', numerator: record.aspirationRisk || 0, denominator: record.aspirationTotal || 0, result: pctAspiration, format: 'percent' };

    const pctConciencia = record.emergencyTotalPatients > 0 ? (record.consciousness / record.emergencyTotalPatients * 100) : 0;
    indicadores.pctConciencia = { label: 'Evaluación Conciencia', numerator: record.consciousness || 0, denominator: record.emergencyTotalPatients || 0, result: pctConciencia, format: 'percent' };

    return indicadores;
  }

  // ================================================================
  // RENDERIZAR ÚLTIMO REGISTRO INDICADORES (CON SEMÁFORO)
  // ================================================================
  async function renderUltimoRegistroIndicadores() {
    const container = document.getElementById('ultimoRegistroIndicadores');
    const data = await getData();
    if (data.length === 0) {
      container.innerHTML = '<p class="text-muted">No hay registros aún.</p>';
      return;
    }
    const ultimo = data.sort((a, b) => b.date.localeCompare(a.date))[0];
    const indicadores = calcularIndicadores(ultimo);
    let html = `<div class="table-responsive"><table class="table table-bordered table-sm indicador-tabla">
      <thead><tr><th>Indicador</th><th>Numerador</th><th>Denominador</th><th>Resultado</th><th>Estado</th></tr></thead><tbody>`;
    for (const key in indicadores) {
      const ind = indicadores[key];
      let resultado = '—';
      if (ind.denominator === 0) {
        resultado = '—';
      } else if (ind.format === 'percent') {
        resultado = ind.result.toFixed(1) + '%';
      } else if (ind.format === 'ratio') {
        resultado = ind.result.toFixed(1) + ':1';
      } else if (ind.format === 'avg') {
        resultado = ind.result.toFixed(1) + ' min';
      } else if (ind.format === 'count') {
        resultado = ind.result.toString();
      } else {
        resultado = ind.result.toFixed(1);
      }
      const sem = obtenerSemaforo(ind.label, ind.result, ind.denominator);
      html += `<tr class="${sem.color}">
        <td><strong>${ind.label}</strong></td>
        <td>${ind.numerator}</td>
        <td>${ind.denominator}</td>
        <td>${resultado}</td>
        <td>${sem.texto}</td>
      </tr>`;
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
  }

  async function deleteRecord(date, ward) {
    if (!confirm(`¿Eliminar el registro del día ${date}?`)) return;
    const { error } = await supabaseClient
      .from('REGISTROS')
      .delete()
      .eq('date', date)
      .eq('ward', ward);

    await refreshAll();

  // ================================================================
  // DASHBOARD CON EVOLUCIÓN MENSUAL (CON SEMÁFORO EN KPIs)
  // ================================================================
  async function renderDashboard(ward) {
    const container = document.getElementById('dashboardContent');
    const data = await getData();
    if (data.length === 0) {
      container.innerHTML = `<div class="alert alert-warning">No hay registros para <strong>${ward}</strong>. Comienza a registrar.</div>`;
      return;
    }

    // Agrupar por mes
    const months = {};
    data.forEach(d => {
      const key = d.date.substring(0, 7);
      if (!months[key]) months[key] = [];
      months[key].push(d);
    });
    const sortedMonths = Object.keys(months).sort();
    const labels = sortedMonths.map(m => {
      const [y, mo] = m.split('-');
      const names = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Set', 'Oct', 'Nov', 'Dic'];
      return `${names[parseInt(mo) - 1]} ${y}`;
    });

    function calcMonthlyIndicators(monthData) {
      const sum = {};
      monthData.forEach(r => {
        for (const key in r) {
          if (typeof r[key] === 'number') {
            if (!sum[key]) sum[key] = 0;
            sum[key] += r[key];
          }
        }
      });
      const totalPacientesDia = sum.patientsAttendedDay || 0;
      const totalEnfDia = sum.nursesScheduledDay || 0;
      const totalPacientesNoche = sum.patientsAttendedNight || 0;
      const totalEnfNoche = sum.nursesScheduledNight || 0;
      const totalPacientesTurno = totalPacientesDia + totalPacientesNoche;
      const totalEnfTurno = totalEnfDia + totalEnfNoche;
      const totalGlasgowComplete = sum.glasgowComplete || 0;
      const totalGlasgowTotal = sum.glasgowTotal || 0;
      const totalTriageSum = sum.timeTriageSum || 0;
      const totalTriaged = sum.patientsTriaged || 0;
      const totalThromboSum = sum.timeThrombolysisSum || 0;
      const totalThrombolysed = sum.thrombolysedPatients || 0;
      const totalFalls = sum.emergencyFalls || 0;
      const totalEmergPac = sum.emergencyTotalPatients || 0;
      const totalPaeDay = sum.paeDay || 0;
      const totalPaeNight = sum.paeNight || 0;
      const totalPaeTotal = sum.paeTotal || 0;
      const totalConsciousness = sum.consciousness || 0;
      const totalObsSum = sum.obsStaySum || 0;
      const totalObsPatients = sum.obsPatients || 0;
      const totalAspRisk = sum.aspirationRisk || 0;
      const totalAspTotal = sum.aspirationTotal || 0;

      const ind = {
        relPacEnf: totalEnfTurno > 0 ? (totalPacientesTurno / totalEnfTurno) : 0,
        relPacEnfDia: totalEnfDia > 0 ? (totalPacientesDia / totalEnfDia) : 0,
        relPacEnfNoche: totalEnfNoche > 0 ? (totalPacientesNoche / totalEnfNoche) : 0,
        pctGlasgow: totalGlasgowTotal > 0 ? (totalGlasgowComplete / totalGlasgowTotal * 100) : 0,
        avgTriage: totalTriaged > 0 ? (totalTriageSum / totalTriaged) : 0,
        avgThrombo: totalThrombolysed > 0 ? (totalThromboSum / totalThrombolysed) : 0,
        pctFalls: totalEmergPac > 0 ? (totalFalls / totalEmergPac * 100) : 0,
        pctPAE: totalPaeTotal > 0 ? ((totalPaeDay + totalPaeNight) / totalPaeTotal * 100) : 0,
        paeDayTotal: totalPaeDay,
        paeNightTotal: totalPaeNight,
        avgObs: totalObsPatients > 0 ? (totalObsSum / totalObsPatients) : 0,
        pctAspiration: totalAspTotal > 0 ? (totalAspRisk / totalAspTotal * 100) : 0,
        pctConciencia: totalEmergPac > 0 ? (totalConsciousness / totalEmergPac * 100) : 0,
        totalPacientesDia,
        totalEnfDia,
        totalPacientesNoche,
        totalEnfNoche,
        totalEmergPac,
        glasgowComplete: totalGlasgowComplete,
        glasgowTotal: totalGlasgowTotal,
        timeTriageSum: totalTriageSum,
        patientsTriaged: totalTriaged,
        timeThrombolysisSum: totalThromboSum,
        thrombolysedPatients: totalThrombolysed,
        emergencyFalls: totalFalls,
        obsStaySum: totalObsSum,
        obsPatients: totalObsPatients,
        aspirationRisk: totalAspRisk,
        aspirationTotal: totalAspTotal,
        paeDayTotal: totalPaeDay,
        paeNightTotal: totalPaeNight,
        paeTotal: totalPaeTotal,
        consciousness: totalConsciousness,
      };
      return ind;
    }

    const monthIndicators = sortedMonths.map(m => calcMonthlyIndicators(months[m]));
    const last = monthIndicators[monthIndicators.length - 1] || {};

    let html = `<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">

    </div>`;

    // KPIs (con semáforo)
    const kpis = [
      { label: 'Relación Pac/Enf (global)', value: last.relPacEnf || 0, unit: ':1', den: 1 },
      { label: 'Relación Pac/Enf (DÍA)', value: last.relPacEnfDia || 0, unit: ':1', den: 1 },
      { label: 'Relación Pac/Enf (NOCHE)', value: last.relPacEnfNoche || 0, unit: ':1', den: 1 },
      { label: 'Cumpl. Glasgow', value: last.pctGlasgow || 0, unit: '%', den: last.glasgowTotal },
      { label: 'Triaje (min)', value: last.avgTriage || 0, unit: 'min', den: last.patientsTriaged },
      { label: 'Trombólisis (min)', value: last.avgThrombo || 0, unit: 'min', den: last.thrombolysedPatients },
      { label: 'Incid. Caídas', value: last.pctFalls || 0, unit: '%', den: last.totalEmergPac },
      { label: 'Cumpl. PAE', value: last.pctPAE || 0, unit: '%', den: last.paeTotal },
      { label: 'Observación (min)', value: last.avgObs || 0, unit: 'min', den: last.obsPatients },
      { label: 'Riesgo Aspiración', value: last.pctAspiration || 0, unit: '%', den: last.aspirationTotal },
      { label: 'Evaluación Conciencia', value: last.pctConciencia || 0, unit: '%', den: last.totalEmergPac },

      { label: 'PAE Noche', value: last.paeNightTotal || 0, unit: '', den: 1 },

    kpis.forEach(k => {

      html += `<div class="col-md-3"><div class="kpi-card" style="border-left-color: ${sem.color === 'status-green' ? '#28a745' : sem.color === 'status-yellow' ? '#ffc107' : sem.color === 'status-red' ? '#dc3545' : '#6c757d'};">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value">${val}<span class="kpi-unit">${k.unit}</span></div>
        <small class="${sem.color} sem-foro-texto">${sem.texto}</small>
      </div></div>`;
    });
    html += `</div>`;

    // =============================================
    // GRÁFICO DE BARRAS AGRUPADAS (evolución mensual)
    // =============================================
    html += `<h5>Evolución Mensual de Indicadores</h5>
    <div class="row"><div class="col-md-12"><div class="chart-container" style="height: 300px;"><canvas id="chartEvolucionMensual"></canvas></div></div></div>`;

    // =============================================
    // TABLA DE EVOLUCIÓN MENSUAL
    // =============================================
    html += `<div class="card mt-4">
      <div class="card-header"><i class="fas fa-table me-2"></i>Tabla de Evolución Mensual</div>
      <div class="card-body">
        <div class="table-responsive"><table class="table table-bordered table-striped indicador-tabla">
          <thead><tr><th>Indicador</th>${labels.map(l => `<th>${l}</th>`).join('')}</tr></thead><tbody>`;

    const filas = [
      { label: 'Relación Pac/Enf (global)', key: 'relPacEnf', fmt: v => (v).toFixed(1) + ':1' },
      { label: 'Relación Pac/Enf (DÍA)', key: 'relPacEnfDia', fmt: v => (v).toFixed(1) + ':1' },
      { label: 'Relación Pac/Enf (NOCHE)', key: 'relPacEnfNoche', fmt: v => (v).toFixed(1) + ':1' },
      { label: 'Cumplimiento Glasgow (%)', key: 'pctGlasgow', fmt: v => (v).toFixed(1) + '%' },
      { label: 'Tiempo Triaje (min)', key: 'avgTriage', fmt: v => (v).toFixed(1) },
      { label: 'Tiempo Trombólisis (min)', key: 'avgThrombo', fmt: v => (v).toFixed(1) },
      { label: 'Incidencia Caídas (%)', key: 'pctFalls', fmt: v => (v).toFixed(1) + '%' },
      { label: 'Cumplimiento PAE (%)', key: 'pctPAE', fmt: v => (v).toFixed(1) + '%' },
      { label: 'Tiempo Observación (min)', key: 'avgObs', fmt: v => (v).toFixed(1) },
      { label: 'Riesgo de Aspiración (%)', key: 'pctAspiration', fmt: v => (v).toFixed(1) + '%' },
      { label: 'Evaluación Conciencia (%)', key: 'pctConciencia', fmt: v => (v).toFixed(1) + '%' },
    ];

    filas.forEach(fila => {
      html += `<tr><td><strong>${fila.label}</strong></td>`;
      monthIndicators.forEach(ind => {
        const val = ind[fila.key] !== undefined ? ind[fila.key] : 0;
        html += `<td>${fila.fmt(val)}</td>`;
      });
      html += `</tr>`;
    });

    html += `</tbody></table></div></div></div>`;

    // =============================================
    // TABLA DE DETALLE DEL ÚLTIMO MES (CON SEMÁFORO)
    // =============================================
    html += `<div class="card mt-4">
      <div class="card-header"><i class="fas fa-table me-2"></i>Detalle de indicadores (último mes)</div>
      <div class="card-body">
        <div class="table-responsive"><table class="table table-bordered table-striped indicador-tabla">
          <thead><tr><th>Indicador</th><th>Numerador</th><th>Denominador</th><th>Resultado</th><th>Estado</th></tr></thead><tbody>`;

    const detalle = [
      { label: 'Relación Pac/Enf (global)', num: (last.totalPacientesDia || 0) + (last.totalPacientesNoche || 0),
        den: (last.totalEnfDia || 0) + (last.totalEnfNoche || 0), fmt: 'ratio' },
      { label: 'Relación Pac/Enf (DÍA)', num: last.totalPacientesDia || 0, den: last.totalEnfDia || 0,
      fmt: 'ratio' },
      { label: 'Relación Pac/Enf (NOCHE)', num: last.totalPacientesNoche || 0, den: last.totalEnfNoche || 0,
        fmt: 'ratio' },
      { label: 'Cumplimiento Glasgow', num: last.glasgowComplete || 0, den: last.glasgowTotal || 0,
      fmt: 'percent' },
      { label: 'Tiempo Triaje (min)', num: last.timeTriageSum || 0, den: last.patientsTriaged || 0, fmt: 'avg' },
      { label: 'Tiempo Trombólisis (min)', num: last.timeThrombolysisSum || 0, den: last.thrombolysedPatients || 0,

      { label: 'Tiempo Observación (min)', num: last.obsStaySum || 0, den: last.obsPatients || 0, fmt: 'avg' },

          0, fmt: 'percent' },
      { label: 'Riesgo de Aspiración', num: last.aspirationRisk || 0, den: last.aspirationTotal || 0,

    html += `</tbody></table></div></div></div>`;

    container.innerHTML = html;

    setTimeout(() => {

          '#6f42c1'
        ];
        const datasetLabels = [
          'Rel. Pac/Enf', 'Glasgow (%)', 'Triaje (min)', 'Trombólisis (min)',
          'Caídas (%)', 'PAE (%)', 'Observación (min)', 'Aspiración (%)', 'Conciencia (%)'
        ];

  // ================================================================
  // REPORTE TRIMESTRAL (CON SEMÁFORO)
  // ================================================================
  async function renderReport(ward) {
    const container = document.getElementById('reportContent');
    const data = await getData();
    if (data.length === 0) {
      container.innerHTML = `<div class="alert alert-warning">No hay datos para <strong>${ward}</strong>.</div>`;
      return;
    }

    function getQuarter(m) {
      const mo = parseInt(m.split('-')[1]);
      if (mo <= 3) return 'Trim I';
      if (mo <= 6) return 'Trim II';
      if (mo <= 9) return 'Trim III';
      return 'Trim IV';
    }

    const quarters = {};
    data.forEach(d => {
      const key = d.date.substring(0, 7);
      const q = getQuarter(key);
      if (!quarters[q]) quarters[q] = [];
      quarters[q].push(d);
    });

    const sortedQuarters = ['Trim I', 'Trim II', 'Trim III', 'Trim IV'];
    const quarterData = {};
    sortedQuarters.forEach(q => {
      const records = quarters[q] || [];
      if (records.length === 0) { quarterData[q] = null; return; }
      const sum = {};
      records.forEach(r => {
        for (const key in r) {
          if (typeof r[key] === 'number') {
            if (!sum[key]) sum[key] = 0;
            sum[key] += r[key];
          }
        }
      });
      const totalPacientesDia = sum.patientsAttendedDay || 0;
      const totalEnfDia = sum.nursesScheduledDay || 0;
      const totalPacientesNoche = sum.patientsAttendedNight || 0;
      const totalEnfNoche = sum.nursesScheduledNight || 0;
      const totalPacientesTurno = totalPacientesDia + totalPacientesNoche;
      const totalEnfTurno = totalEnfDia + totalEnfNoche;
      const totalGlasgowComplete = sum.glasgowComplete || 0;
      const totalGlasgowTotal = sum.glasgowTotal || 0;
      const totalTriageSum = sum.timeTriageSum || 0;
      const totalTriaged = sum.patientsTriaged || 0;
      const totalThromboSum = sum.timeThrombolysisSum || 0;
      const totalThrombolysed = sum.thrombolysedPatients || 0;
      const totalFalls = sum.emergencyFalls || 0;
      const totalEmergPac = sum.emergencyTotalPatients || 0;
      const totalPaeDay = sum.paeDay || 0;
      const totalPaeNight = sum.paeNight || 0;
      const totalPaeTotal = sum.paeTotal || 0;
      const totalConsciousness = sum.consciousness || 0;
      const totalObsSum = sum.obsStaySum || 0;
      const totalObsPatients = sum.obsPatients || 0;
      const totalAspRisk = sum.aspirationRisk || 0;
      const totalAspTotal = sum.aspirationTotal || 0;

      const ind = {
        totalPacientesDia,
        totalEnfDia,
        totalPacientesNoche,
        totalEnfNoche,
        totalEmergPac,
        relPacEnf_num: totalPacientesTurno,
        relPacEnf_den: totalEnfTurno,
        relPacEnf: totalEnfTurno > 0 ? totalPacientesTurno / totalEnfTurno : 0,
        relPacEnfDia_num: totalPacientesDia,
        relPacEnfDia_den: totalEnfDia,
        relPacEnfDia: totalEnfDia > 0 ? totalPacientesDia / totalEnfDia : 0,
        relPacEnfNoche_num: totalPacientesNoche,
        relPacEnfNoche_den: totalEnfNoche,
        relPacEnfNoche: totalEnfNoche > 0 ? totalPacientesNoche / totalEnfNoche : 0,
        pctGlasgow_num: totalGlasgowComplete,
        pctGlasgow_den: totalGlasgowTotal,
        pctGlasgow: totalGlasgowTotal > 0 ? totalGlasgowComplete / totalGlasgowTotal * 100 : 0,
        avgTriage_num: totalTriageSum,
        avgTriage_den: totalTriaged,
        avgTriage: totalTriaged > 0 ? totalTriageSum / totalTriaged : 0,
        avgThrombo_num: totalThromboSum,
        avgThrombo_den: totalThrombolysed,
        avgThrombo: totalThrombolysed > 0 ? totalThromboSum / totalThrombolysed : 0,
        pctFalls_num: totalFalls,
        pctFalls_den: totalEmergPac,
        pctFalls: totalEmergPac > 0 ? totalFalls / totalEmergPac * 100 : 0,
        pctPAE_num: totalPaeDay + totalPaeNight,
        pctPAE_den: totalPaeTotal,
        pctPAE: totalPaeTotal > 0 ? (totalPaeDay + totalPaeNight) / totalPaeTotal * 100 : 0,
        paeDayTotal: totalPaeDay,
        paeNightTotal: totalPaeNight,
        avgObs_num: totalObsSum,
        avgObs_den: totalObsPatients,
        avgObs: totalObsPatients > 0 ? totalObsSum / totalObsPatients : 0,
        pctAspiration_num: totalAspRisk,
        pctAspiration_den: totalAspTotal,
        pctAspiration: totalAspTotal > 0 ? totalAspRisk / totalAspTotal * 100 : 0,
        pctConciencia_num: totalConsciousness,
        pctConciencia_den: totalEmergPac,
        pctConciencia: totalEmergPac > 0 ? totalConsciousness / totalEmergPac * 100 : 0,
        consciousness: totalConsciousness,
      };
      quarterData[q] = ind;
    });

    let html = `<h4>Reporte Trimestral - ${ward}</h4>
    <p class="text-muted">Cada indicador se muestra con su valor, numerador y denominador.</p>
    <div class="table-responsive"><table class="table table-bordered table-striped table-indicators" id="quarterTable">
      <thead><tr><th>Indicador</th>${sortedQuarters.map(q => `<th>${q}</th>`).join('')}</tr></thead><tbody>`;

    const datosBrutos = [
      { label: 'Pacientes atendidos DÍA', key: 'totalPacientesDia', fmt: v => v },
      { label: 'Enfermeras DÍA', key: 'totalEnfDia', fmt: v => v },
      { label: 'Pacientes atendidos NOCHE', key: 'totalPacientesNoche', fmt: v => v },
      { label: 'Enfermeras NOCHE', key: 'totalEnfNoche', fmt: v => v },
      { label: 'Total pacientes atendidos en Emergencia (24h)', key: 'totalEmergPac', fmt: v => v },
    ];

    datosBrutos.forEach(row => {
      html += `<tr><td><strong>${row.label}</strong></td>`;
      sortedQuarters.forEach(q => {
        const qData = quarterData[q];
        let val = qData ? (qData[row.key] !== undefined ? qData[row.key] : 0) : 0;
        html += `<td>${row.fmt(val)}</td>`;
      });
      html += `</tr>`;
    });

    const indicadores = [
      { label: 'Relación Pac/Enf (global)', keyVal: 'relPacEnf', keyNum: 'relPacEnf_num', keyDen: 'relPacEnf_den',
        fmtVal: v => (v).toFixed(1) + ':1', fmtNum: v => v, fmtDen: v => v },
      { label: 'Relación Pac/Enf (DÍA)', keyVal: 'relPacEnfDia', keyNum: 'relPacEnfDia_num',
        keyDen: 'relPacEnfDia_den', fmtVal: v => (v).toFixed(1) + ':1', fmtNum: v => v, fmtDen: v => v },
      { label: 'Relación Pac/Enf (NOCHE)', keyVal: 'relPacEnfNoche', keyNum: 'relPacEnfNoche_num',
        keyDen: 'relPacEnfNoche_den', fmtVal: v => (v).toFixed(1) + ':1', fmtNum: v => v, fmtDen: v => v },
      { label: 'Cumplimiento Glasgow (%)', keyVal: 'pctGlasgow', keyNum: 'pctGlasgow_num', keyDen: 'pctGlasgow_den',
        fmtVal: v => (v).toFixed(1) + '%', fmtNum: v => v, fmtDen: v => v },
      { label: 'Tiempo Triaje (min)', keyVal: 'avgTriage', keyNum: 'avgTriage_num', keyDen: 'avgTriage_den',
        fmtVal: v => (v).toFixed(1), fmtNum: v => v, fmtDen: v => v },
      { label: 'Tiempo Trombólisis (min)', keyVal: 'avgThrombo', keyNum: 'avgThrombo_num',
        keyDen: 'avgThrombo_den', fmtVal: v => (v).toFixed(1), fmtNum: v => v, fmtDen: v => v },
      { label: 'Incidencia Caídas (%)', keyVal: 'pctFalls', keyNum: 'pctFalls_num', keyDen: 'pctFalls_den',
        fmtVal: v => (v).toFixed(1) + '%', fmtNum: v => v, fmtDen: v => v },
      { label: 'Cumplimiento PAE (%)', keyVal: 'pctPAE', keyNum: 'pctPAE_num', keyDen: 'pctPAE_den',
        fmtVal: v => (v).toFixed(1) + '%', fmtNum: v => v, fmtDen: v => v },
      { label: 'Tiempo Observación (min)', keyVal: 'avgObs', keyNum: 'avgObs_num', keyDen: 'avgObs_den',
        fmtVal: v => (v).toFixed(1), fmtNum: v => v, fmtDen: v => v },
      { label: 'Riesgo de Aspiración (%)', keyVal: 'pctAspiration', keyNum: 'pctAspiration_num',
        keyDen: 'pctAspiration_den', fmtVal: v => (v).toFixed(1) + '%', fmtNum: v => v, fmtDen: v => v },
      { label: 'Evaluación Conciencia (%)', keyVal: 'pctConciencia', keyNum: 'pctConciencia_num',
        keyDen: 'pctConciencia_den', fmtVal: v => (v).toFixed(1) + '%', fmtNum: v => v, fmtDen: v => v },
    ];

    indicadores.forEach(ind => {
      html += `<tr><td><strong>${ind.label}</strong> (Valor)</td>`;
      sortedQuarters.forEach(q => {
        const qData = quarterData[q];
        let val = qData ? (qData[ind.keyVal] !== undefined ? qData[ind.keyVal] : 0) : 0;
        html += `<td>${ind.fmtVal(val)}</td>`;
      });
      html += `</tr>`;

      html += `<tr><td style="padding-left:20px; font-size:0.85rem; color:#6c757d;">Numerador</td>`;
      sortedQuarters.forEach(q => {
        const qData = quarterData[q];
        let val = qData ? (qData[ind.keyNum] !== undefined ? qData[ind.keyNum] : 0) : 0;
        html += `<td style="font-size:0.85rem;">${ind.fmtNum(val)}</td>`;
      });
      html += `</tr>`;

      html += `<tr><td style="padding-left:20px; font-size:0.85rem; color:#6c757d;">Denominador</td>`;
      sortedQuarters.forEach(q => {
        const qData = quarterData[q];
        let val = qData ? (qData[ind.keyDen] !== undefined ? qData[ind.keyDen] : 0) : 0;
        html += `<td style="font-size:0.85rem;">${ind.fmtDen(val)}</td>`;
      });
      html += `</tr>`;
    });

    html += `</tbody></table>
    <button class="btn btn-outline-primary mt-3" onclick="copyTable()"><i class="fas fa-copy me-2"></i> Copiar Tabla</button></div>`;
    container.innerHTML = html;
  }

  function copyTable() {
    const table = document.getElementById('quarterTable');
    if (!table) return;
    const range = document.createRange();
    range.selectNode(table);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    alert('Tabla copiada al portapapeles.');
  }

  // ================================================================
  // REFRESH Y GUARDAR
  // ================================================================
  async function refreshAll() {
    await renderLastEntries();
    await renderUltimoRegistroIndicadores();
    await renderDashboard(FIXED_WARD);
    await renderReport(FIXED_WARD);
  }

  async function saveDailyRecord(e) {
    e.preventDefault();
    const date = document.getElementById('regDate').value;
    if (!date) { alert('Selecciona una fecha.'); return; }

    const triajeText = document.getElementById('tiemposTriaje').value.trim();
    const triajeData = procesarTiempos(triajeText);
    const timeTriageSum = triajeData.suma;
    const patientsTriaged = triajeData.cantidad;

    const tromboText = document.getElementById('tiemposTrombolisis').value.trim();
    const tromboData = procesarTiempos(tromboText);
    const timeThrombolysisSum = tromboData.suma;
    const thrombolysedPatients = tromboData.cantidad;

    const obsText = document.getElementById('tiemposObservacion').value.trim();
    const obsData = procesarTiempos(obsText);
    const obsStaySum = obsData.suma;
    const obsPatients = obsData.cantidad;

    const record = {
      date,
      ward: FIXED_WARD,
      patientsAttendedDay: parseInt(document.getElementById('patientsAttendedDay').value) || 0,
      nursesScheduledDay: parseInt(document.getElementById('nursesScheduledDay').value) || 0,
      patientsAttendedNight: parseInt(document.getElementById('patientsAttendedNight').value) || 0,
      nursesScheduledNight: parseInt(document.getElementById('nursesScheduledNight').value) || 0,
      glasgowComplete: parseInt(document.getElementById('glasgowComplete').value) || 0,
      glasgowTotal: parseInt(document.getElementById('glasgowTotal').value) || 0,
      timeTriageSum: timeTriageSum,
      patientsTriaged: patientsTriaged,
      timeThrombolysisSum: timeThrombolysisSum,
      thrombolysedPatients: thrombolysedPatients,
      emergencyFalls: parseInt(document.getElementById('emergencyFalls').value) || 0,
      emergencyTotalPatients: parseInt(document.getElementById('emergencyTotalPatients').value) || 0,
      paeDay: parseInt(document.getElementById('paeDay').value) || 0,
      paeNight: parseInt(document.getElementById('paeNight').value) || 0,
      paeTotal: parseInt(document.getElementById('paeTotal').value) || 0,
      consciousness: parseInt(document.getElementById('consciousness').value) || 0,
      obsStaySum: obsStaySum,
      obsPatients: obsPatients,
      aspirationRisk: parseInt(document.getElementById('aspirationRisk').value) || 0,
      aspirationTotal: parseInt(document.getElementById('aspirationTotal').value) || 0,
    };

    const success = await saveData(record);
    if (success) {
      document.getElementById('registerFeedback').innerHTML =
        `<div class="alert alert-success">✅ Registro del día <strong>${date}</strong> guardado en la nube.</div>`;
      await refreshAll();
    } else {
      document.getElementById('registerFeedback').innerHTML =
        `<div class="alert alert-danger">❌ Error al guardar. Revisa la consola.</div>`;
    }
  }

  // ================================================================
  // INICIALIZACIÓN
  // ================================================================
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('regWard').value = FIXED_WARD;
    document.getElementById('wardDisplay').innerHTML = `<i class="fas fa-hospital me-1"></i> Emergencia`;
    document.querySelector('.alert-fixed strong').textContent = 'Emergencia';

    renderExtraFields();
    refreshAll();

    document.getElementById('dailyForm').addEventListener('submit', saveDailyRecord);
    document.getElementById('regDate').value = new Date().toISOString().split('T')[0];

    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    var tooltipList = tooltipTriggerList.map(function(tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl);
    });
  });
</script>
</body>
</html>
