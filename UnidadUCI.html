    <style>

        .form-control:focus { border-color: #2c7da0; box-shadow: 0 0 0 0.2rem rgba(44,125,160,0.2); }

<div class="container mt-4">

    <div class="tab-content" id="myTabContent">
        <!-- REGISTRO DIARIO -->

                            <div class="col-md-3"><label class="form-label">Ingresos del día</label><input type="number" class="form-control" id="admissions" value="0" min="0"></div>
                            <div class="col-md-3"><label class="form-label">Egresos del día</label><input type="number" class="form-control" id="discharges" value="0" min="0"></div>
                            <div class="col-md-3"><label class="form-label">Total pacientes (calculado)</label><input type="number" class="form-control" id="totalPatients" readonly style="background:#e9ecef; font-weight:bold;"></div>

                                <div class="col-12"><h6 class="section-title"><i class="fas fa-clipboard-list me-2"></i>Indicadores Comunes</h6></div>
                                <div class="col-md-3"><label class="form-label">N° pacientes ingresados EVALUADOS con escala de riesgo LPP</label><input type="number" class="form-control" id="lppEvaluated" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° pacientes que desarrollan LPP (durante su estancia)</label><input type="number" class="form-control" id="lppIncidence" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Eventos Adversos notificados en el día</label><input type="number" class="form-control" id="adverseEvents" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Caídas ocurridas en el día</label><input type="number" class="form-control" id="falls" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Cuidados CVC realizados en el día</label><input type="number" class="form-control" id="cvcDone" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Oportunidades de cuidado CVC en el día</label><input type="number" class="form-control" id="cvcTotal" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Cuidados VM realizados en el día</label><input type="number" class="form-control" id="vmDone" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Oportunidades de cuidado VM en el día</label><input type="number" class="form-control" id="vmTotal" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Cuidados CUP realizados en el día</label><input type="number" class="form-control" id="cupDone" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Oportunidades de cuidado CUP en el día</label><input type="number" class="form-control" id="cupTotal" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Pacientes con CVP en el día</label><input type="number" class="form-control" id="cvpTotal" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Flebitis (CVP) en el día</label><input type="number" class="form-control" id="phlebitis" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label" style="color:#17a2b8;">N° PAE ejecutados en el turno día</label><input type="number" class="form-control" id="paeDay" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label" style="color:#6f42c1;">N° PAE ejecutados en el turno noche</label><input type="number" class="form-control" id="paeNight" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Total PAE que debieron registrarse (día + noche)</label><input type="number" class="form-control" id="paeTotal" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label" style="color:#007bff;">N° Glasgow registradas en el turno día</label><input type="number" class="form-control" id="consciousnessDay" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label" style="color:#6610f2;">N° Glasgow registradas en el turno noche</label><input type="number" class="form-control" id="consciousnessNight" value="0" min="0"></div>
                                <div class="col-md-3"><label class="form-label">N° Total Glasgow que debieron registrarse (día + noche)</label><input type="number" class="form-control" id="consciousnessExpected" value="0" min="0"></div>
                            </div>

                            <!-- INDICADORES ADICIONALES UCI (11 al 21) -->
                            <div id="extraFieldsContainer" class="row g-3 mt-3"></div>

                            <div class="col-12 mt-3">
                                <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save me-2"></i> Guardar Registro</button>
                            </div>
                        </div>
                    </form>
                    <div id="registerFeedback" class="mt-3"></div>
                </div>
            </div>

            <div class="card mt-3">
                <div class="card-header"><i class="fas fa-table me-2"></i>Indicadores del último registro</div>
                <div class="card-body" id="ultimoRegistroIndicadores" style="max-height: 400px; overflow-y: auto;">
                    <p class="text-muted">Aún no hay registros.</p>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><i class="fas fa-history"></i> Últimos Registros</div>
                <div class="card-body" id="lastEntries" style="max-height: 300px; overflow-y: auto;"><p class="text-muted">Aún no hay registros.</p></div>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div class="tab-pane fade" id="dashboard" role="tabpanel">
            <div id="dashboardContent"><div class="alert alert-info">Cargando indicadores...</div></div>
        </div>

        <!-- REPORTE -->
        <div class="tab-pane fade" id="report" role="tabpanel">
            <div id="reportContent"><div class="alert alert-info">Cargando reporte...</div></div>
        </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
<script>
    // ================================================================
    // CONFIGURACIÓN SUPABASE
    // ================================================================
    const SUPABASE_URL = 'https://hdhqzawcylkvttsqqjty.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_x5r7hUrN2pzVexbtZ_b0Wg_OBDEMAKP';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const FIXED_WARD = 'Unidad UCI';

    // ================================================================
    // DEFINICIÓN DE CAMPOS ADICIONALES UCI (IDÉNTICO A UCIN)
    // ================================================================
    const UCIN_FIELDS = [
        // Orden 11: Horas de Enfermería
        { num: 'hoursNursing', numLabel: 'Suma total de horas de enfermería en 24h (día + noche)',
            den: 'hoursNursingDen', denLabel: 'Total de pacientes hospitalizados en la UCI (24h)' },
        // Orden 12: Ratio día
        { num: 'patientsTurnDay', numLabel: 'N° de pacientes hospitalizados en el turno día (12h)',
            den: 'nursesDay', denLabel: 'N° de enfermeras asistenciales en el turno día (12h)' },
        // Orden 13: Ratio noche
        { num: 'patientsTurnNight', numLabel: 'N° de pacientes hospitalizados en el turno noche (12h)',
            den: 'nursesNight', denLabel: 'N° de enfermeras asistenciales en el turno noche (12h)' },
        // Orden 14: VAP
        { num: 'vapCases', numLabel: 'N° de casos VAP confirmados en el día', den: 'vmDays',
            denLabel: 'N° de pacientes con Ventilación Mecánica en el día' },
        // Orden 15: Sedación evaluada
        { num: 'sedationEvaluated', numLabel: 'N° de pacientes con evaluación de sedación registrada (escala validada)',
            den: 'sedationTotal', denLabel: 'N° total de pacientes bajo sedación/analgesia' },
        // Orden 16: PIC vigilada
        { num: 'picRegistered', numLabel: 'N° de pacientes con registro de PIC vigilado por enfermería',
            den: 'picTotal', denLabel: 'N° total de pacientes con monitorización de presión intracraneal (PIC)' },
        // Orden 17: Retiro CVC
        { num: 'raCvc', numLabel: 'N° de retiros accidentales de CVC/CVP', den: 'pacCvc',
            denLabel: 'Total de pacientes con CVC/CVP' },
        // Orden 18: Retiro TET
        { num: 'raTet', numLabel: 'N° de retiros accidentales de TET', den: 'pacTet',
            denLabel: 'Total de pacientes con TET' },
        // Orden 19: Retiro SNG/SOG
        { num: 'raSng', numLabel: 'N° de retiros accidentales de SNG/SOG', den: 'pacSng',
            denLabel: 'Total de pacientes con SNG/SOG' },
        // Orden 20: Retiro CUP
        { num: 'raCup', numLabel: 'N° de retiros accidentales de CUP', den: 'pacCup',
            denLabel: 'Total de pacientes con CUP' },
        // Orden 21: Encuestas satisfactorias
        { num: 'surveySatisfied', numLabel: 'N° de encuestas con valoración satisfactoria o muy satisfactoria',
            den: 'surveyApplied', denLabel: 'N° total de encuestas aplicadas' },
    ];

    // ================================================================
    // FUNCIONES AUXILIARES
    // ================================================================
    function renderExtraFields() {
        const container = document.getElementById('extraFieldsContainer');
        container.innerHTML =
            '<div class="col-12"><h6 class="section-title"><i class="fas fa-plus-circle me-2"></i>Indicadores Específicos UCI</h6></div>';

        UCIN_FIELDS.forEach(f => {
            const col1 = document.createElement('div');
            col1.className = 'col-md-3';
            col1.innerHTML =
                `<label class="form-label">${f.numLabel}</label><input type="number" class="form-control" id="${f.num}" value="0" min="0">`;

            const col2 = document.createElement('div');
            col2.className = 'col-md-3';
            col2.innerHTML =
                `<label class="form-label">${f.denLabel}</label><input type="number" class="form-control" id="${f.den}" value="0" min="0">`;

            container.appendChild(col1);
            container.appendChild(col2);
        });
    }

    function updateTotal() {
        const start = parseInt(document.getElementById('startPatients').value) || 0;
        const adm = parseInt(document.getElementById('admissions').value) || 0;
        const dis = parseInt(document.getElementById('discharges').value) || 0;
        document.getElementById('totalPatients').value = Math.max(0, start + adm - dis);
    }

    // ================================================================
    // GESTIÓN DE DATOS (Supabase)
    // ================================================================
    async function getData() {
        const { data, error } = await supabaseClient
            .from("REGISTROS")
            .select("*")
            .eq("ward", FIXED_WARD)
            .order("date", { ascending: true });
        if (error) { console.error(error); return []; }
        return data.map(row => row.data);
    }

    async function saveData(record) {
        const { data: existing, error: checkError } = await supabaseClient
            .from("REGISTROS")
            .select("id")
            .eq("date", record.date)
            .eq("ward", FIXED_WARD)
            .maybeSingle();
        if (checkError) { console.error(checkError); alert("Error de verificación"); return false; }
        if (existing) {
            const { error } = await supabaseClient
                .from("REGISTROS")
                .update({ data: record })
                .eq("id", existing.id);
            if (error) { console.error(error); alert("Error al actualizar"); return false; }
        } else {
            const { error } = await supabaseClient
                .from("REGISTROS")
                .insert({ date: record.date, ward: FIXED_WARD, data: record });
            if (error) { console.error(error); alert("Error al insertar"); return false; }
        }
        return true;
    }

    // ================================================================
    // SEMÁFORO (SIN FILTRO DE MÍNIMO DE DENOMINADOR)
    // ================================================================
    function obtenerSemaforo(nombre, valor, denominador) {
        if (denominador === 0) {
            return { color: 'status-neutral', texto: 'N/A' };
        }

        const umbrales = {
            'Cobertura LPP': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Incidencia LPP': { verde: 5, amarillo: 12, rojo: 20, invertido: true },
            'Tasa EA (x1000)': { verde: 30, amarillo: 60, rojo: 120, invertido: true },
            'Tasa Caídas (x1000)': { verde: 20, amarillo: 50, rojo: 100, invertido: true },
            'Cumpl. CVC': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumpl. VM': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumpl. CUP': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Flebitis (CVP)': { verde: 5, amarillo: 10, rojo: 20, invertido: true },
            'Cumpl. PAE': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Cumpl. Glasgow': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Horas Enfermería (24h)': { verde: 12, amarillo: 8, rojo: 5, invertido: false },
            'Ratio día': { verde: 2, amarillo: 3, rojo: 4, invertido: false },
            'Ratio noche': { verde: 2.5, amarillo: 3.5, rojo: 5, invertido: false },
            'Tasa VAP (x1000)': { verde: 10, amarillo: 20, rojo: 40, invertido: true },
            'Sedación evaluada': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'PIC vigilada': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Retiro CVC/CVP': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Retiro TET': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Retiro SNG/SOG': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Retiro CUP': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
            'Encuestas satisfactorias': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
        };

        const u = umbrales[nombre] || { verde: 90, amarillo: 70, rojo: 50, invertido: false };
        let color, texto;

        if (u.invertido) {
            if (valor <= u.verde) { color = 'status-green';
                texto = 'Cumplido'; } else if (valor <= u.amarillo) { color = 'status-yellow';
                texto = 'En observación'; } else if (valor <= u.rojo) { color = 'status-yellow';
                texto = 'En observación'; } else { color = 'status-red';
                texto = 'Revisar'; }
        } else {
            if (valor >= u.verde) { color = 'status-green';
                texto = 'Cumplido'; } else if (valor >= u.amarillo) { color = 'status-yellow';
                texto = 'En observación'; } else if (valor >= u.rojo) { color = 'status-yellow';
                texto = 'En observación'; } else { color = 'status-red';
                texto = 'Revisar'; }
        }

        return { color, texto };
    }

    // ================================================================
    // RENDERIZAR INDICADORES DEL ÚLTIMO REGISTRO
    // ================================================================
    function calcularIndicadores(record) {
        const indicadores = {};
        const totalPatients = record.totalPatients || 0;
        const extra = record.extra || {};

        const comunes = [
            { key: 'coberturaLPP', label: 'Cobertura LPP', num: record.lppEvaluated || 0, den: record.admissions ||
                    0, fmt: 'percent' },
            { key: 'incidenciaLPP', label: 'Incidencia LPP', num: record.lppIncidence || 0, den: totalPatients,
                fmt: 'percent' },
            { key: 'tasaEA', label: 'Tasa EA (x1000)', num: record.adverseEvents || 0, den: totalPatients,
                fmt: 'rate' },
            { key: 'tasaCaidas', label: 'Tasa Caídas (x1000)', num: record.falls || 0, den: totalPatients,
                fmt: 'rate' },
            { key: 'cumplimientoCVC', label: 'Cumpl. CVC', num: record.cvcDone || 0, den: record.cvcTotal || 0,
                fmt: 'percent' },
            { key: 'cumplimientoVM', label: 'Cumpl. VM', num: record.vmDone || 0, den: record.vmTotal || 0,
                fmt: 'percent' },
            { key: 'cumplimientoCUP', label: 'Cumpl. CUP', num: record.cupDone || 0, den: record.cupTotal || 0,
                fmt: 'percent' },
            { key: 'incidenciaFlebitis', label: 'Flebitis (CVP)', num: record.phlebitis || 0, den: record
                    .cvpTotal || 0, fmt: 'percent' },
            { key: 'cumplimientoPAE', label: 'Cumpl. PAE', num: (record.paeDay || 0) + (record.paeNight || 0),
                den: record.paeTotal || 0, fmt: 'percent' },

    // ================================================================
    // REPORTE TRIMESTRAL
    // ================================================================
    async function renderReport(ward) {
        const container = document.getElementById('reportContent');
        const data = await getData();
        if (data.length === 0) {
            container.innerHTML =
                `<div class="alert alert-warning">No hay datos para <strong>${ward}</strong>.</div>`;
            return;
        }

        function getQuarter(m) {
            const mo = parseInt(m.split('-')[1]);
            if (mo <= 3) return 'Trim I';
            if (mo <= 6) return 'Trim II';
            if (mo <= 9) return 'Trim III';
            return 'Trim IV';
        }

        const quarters = {};
        data.forEach(d => {
            const key = d.date.substring(0, 7);
            const q = getQuarter(key);
            if (!quarters[q]) quarters[q] = [];
            quarters[q].push(d);
        });

        const sortedQuarters = ['Trim I', 'Trim II', 'Trim III', 'Trim IV'];
        const quarterData = {};
        sortedQuarters.forEach(q => {
            const records = quarters[q] || [];
            if (records.length === 0) { quarterData[q] = null; return; }
            const sum = {};
            records.forEach(r => {
                for (const key in r) {
                    if (typeof r[key] === 'number') {
                        if (!sum[key]) sum[key] = 0;
                        sum[key] += r[key];
                    }
                }
                if (r.extra) {
                    for (const key in r.extra) {
                        if (typeof r.extra[key] === 'number') {
                            if (!sum[key]) sum[key] = 0;
                            sum[key] += r.extra[key];
                        }
                    }
                }
            });
            const totalPatients = sum.totalPatients || 0;
            const admissions = sum.admissions || 0;
            const ind = {
                totalPatients,
                admissions,
                coberturaLPP: admissions > 0 ? (sum.lppEvaluated || 0) / admissions * 100 : 0,
                incidenciaLPP: totalPatients > 0 ? (sum.lppIncidence || 0) / totalPatients * 100 : 0,
                tasaEA: totalPatients > 0 ? (sum.adverseEvents || 0) / totalPatients * 1000 : 0,
                tasaCaidas: totalPatients > 0 ? (sum.falls || 0) / totalPatients * 1000 : 0,
                cumplimientoCVC: (sum.cvcTotal || 0) > 0 ? (sum.cvcDone || 0) / (sum.cvcTotal || 0) * 100 :
                0,
                cumplimientoVM: (sum.vmTotal || 0) > 0 ? (sum.vmDone || 0) / (sum.vmTotal || 0) * 100 : 0,
                cumplimientoCUP: (sum.cupTotal || 0) > 0 ? (sum.cupDone || 0) / (sum.cupTotal || 0) * 100 :
                0,
                incidenciaFlebitis: (sum.cvpTotal || 0) > 0 ? (sum.phlebitis || 0) / (sum.cvpTotal || 0) *
                100 : 0,
                cumplimientoPAE: (sum.paeTotal || 0) > 0 ? ((sum.paeDay || 0) + (sum.paeNight || 0)) / (sum
                    .paeTotal || 0) * 100 : 0,
                cumplimientoGlasgow: (sum.consciousnessExpected || 0) > 0 ? ((sum.consciousnessDay || 0) + (
                    sum.consciousnessNight || 0)) / (sum.consciousnessExpected || 0) * 100 : 0,
                hoursNursing: sum.hoursNursing || 0,
                hoursNursingDen: sum.hoursNursingDen || 0,
                patientsTurnDay: sum.patientsTurnDay || 0,
                nursesDay: sum.nursesDay || 0,
                patientsTurnNight: sum.patientsTurnNight || 0,
                nursesNight: sum.nursesNight || 0,
                vapCases: sum.vapCases || 0,
                vmDays: sum.vmDays || 0,
                sedationEvaluated: sum.sedationEvaluated || 0,
                sedationTotal: sum.sedationTotal || 0,
                picRegistered: sum.picRegistered || 0,
                picTotal: sum.picTotal || 0,
                raCvc: sum.raCvc || 0,
                pacCvc: sum.pacCvc || 0,
                raTet: sum.raTet || 0,
                pacTet: sum.pacTet || 0,
                raSng: sum.raSng || 0,
                pacSng: sum.pacSng || 0,
                raCup: sum.raCup || 0,
                pacCup: sum.pacCup || 0,
                surveySatisfied: sum.surveySatisfied || 0,
                surveyApplied: sum.surveyApplied || 0,
            };
            ind.horasEnfermeria = ind.hoursNursingDen > 0 ? (ind.hoursNursing / ind.hoursNursingDen) : 0;
            ind.ratioDay = ind.nursesDay > 0 ? (ind.patientsTurnDay / ind.nursesDay) : 0;
            ind.ratioNight = ind.nursesNight > 0 ? (ind.patientsTurnNight / ind.nursesNight) : 0;
            ind.tasaVAP = ind.vmDays > 0 ? (ind.vapCases / ind.vmDays * 1000) : 0;
            ind.pctSedation = ind.sedationTotal > 0 ? (ind.sedationEvaluated / ind.sedationTotal * 100) : 0;
            ind.pctPIC = ind.picTotal > 0 ? (ind.picRegistered / ind.picTotal * 100) : 0;
            ind.pctRetiroCvc = ind.pacCvc > 0 ? (ind.raCvc / ind.pacCvc * 100) : 0;
            ind.pctRetiroTet = ind.pacTet > 0 ? (ind.raTet / ind.pacTet * 100) : 0;
            ind.pctRetiroSng = ind.pacSng > 0 ? (ind.raSng / ind.pacSng * 100) : 0;
            ind.pctRetiroCup = ind.pacCup > 0 ? (ind.raCup / ind.pacCup * 100) : 0;
            ind.pctSurvey = ind.surveyApplied > 0 ? (ind.surveySatisfied / ind.surveyApplied * 100) : 0;
            quarterData[q] = ind;
        });

        let html =
            `<h4>Reporte Trimestral - ${ward}</h4>
            <div class="table-responsive"><table class="table table-bordered table-striped table-indicators" id="quarterTable">
              <thead><tr><th>Indicador</th>${sortedQuarters.map(q => `<th>${q}</th>`).join('')}</tr></thead><tbody>`;

        const rows = [
            { label: 'Pacientes-día', key: 'totalPatients', fmt: v => v },
            { label: 'Cobertura LPP', key: 'coberturaLPP', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Incidencia LPP', key: 'incidenciaLPP', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Tasa EA (x1000)', key: 'tasaEA', fmt: v => (v).toFixed(1) },
            { label: 'Tasa Caídas (x1000)', key: 'tasaCaidas', fmt: v => (v).toFixed(1) },
            { label: 'Cumpl. CVC', key: 'cumplimientoCVC', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Cumpl. VM', key: 'cumplimientoVM', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Cumpl. CUP', key: 'cumplimientoCUP', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Flebitis (CVP)', key: 'incidenciaFlebitis', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Cumpl. PAE', key: 'cumplimientoPAE', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Cumpl. Glasgow', key: 'cumplimientoGlasgow', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Horas de Enfermería (24h)', key: 'horasEnfermeria', fmt: v => (v).toFixed(1) + ' h/pac' },
            { label: 'Ratio día', key: 'ratioDay', fmt: v => (v).toFixed(1) + ' pac/enf' },
            { label: 'Ratio noche', key: 'ratioNight', fmt: v => (v).toFixed(1) + ' pac/enf' },
            { label: 'Tasa VAP (x1000)', key: 'tasaVAP', fmt: v => (v).toFixed(1) },
            { label: 'Sedación evaluada', key: 'pctSedation', fmt: v => (v).toFixed(1) + '%' },
            { label: 'PIC vigilada', key: 'pctPIC', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Retiro CVC/CVP', key: 'pctRetiroCvc', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Retiro TET', key: 'pctRetiroTet', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Retiro SNG/SOG', key: 'pctRetiroSng', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Retiro CUP', key: 'pctRetiroCup', fmt: v => (v).toFixed(1) + '%' },
            { label: 'Encuestas satisfactorias', key: 'pctSurvey', fmt: v => (v).toFixed(1) + '%' },
        ];

        rows.forEach(row => {
            html += `<tr><td><strong>${row.label}</strong></td>`;
            sortedQuarters.forEach(q => {
                const qData = quarterData[q];
                let val = qData ? (qData[row.key] !== undefined ? qData[row.key] : 0) : 0;
                html += `<td>${row.fmt(val)}</td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table>
            <button class="btn btn-outline-primary mt-3" onclick="copyTable()"><i class="fas fa-copy me-2"></i> Copiar Tabla</button></div>`;
        container.innerHTML = html;
    }

    function copyTable() {
        const table = document.getElementById('quarterTable');
        if (!table) return;
        const range = document.createRange();
        range.selectNode(table);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('Tabla copiada al portapapeles.');
    }

    // ================================================================
    // ÚLTIMOS REGISTROS
    // ================================================================
    async function renderLastEntries() {
        const container = document.getElementById('lastEntries');
        const data = await getData();
        if (data.length === 0) {
            container.innerHTML = '<p class="text-muted">No hay registros.</p>';
            return;
        }
        let html =
            `<div class="table-responsive"><table class="table table-sm table-bordered">
              <thead><tr><th>Fecha</th><th>Inicio</th><th>Ingresos</th><th>Egresos</th><th>Total</th><th>LPP Eval</th><th>Caídas</th><th>PAE Día</th><th>PAE Noche</th><th>Glasgow Día</th><th>Glasgow Noche</th><th>Acción</th></tr></thead><tbody>`;
        data.slice(0, 15).forEach(r => {
            html += `<tr>
                  <td>${r.date}</td>
                  <td>${r.startPatients||0}</td>
                  <td>${r.admissions||0}</td>
                  <td>${r.discharges||0}</td>
                  <td>${r.totalPatients}</td>
                  <td>${r.lppEvaluated}</td>
                  <td>${r.falls}</td>
                  <td>${r.paeDay||0}</td>
                  <td>${r.paeNight||0}</td>
                  <td>${r.consciousnessDay||0}</td>
                  <td>${r.consciousnessNight||0}</td>
                  <td><button class="btn-delete-record" onclick="deleteRecord('${r.date}','${r.ward}')"><i class="fas fa-trash-alt"></i></button></td>
                </tr>`;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
    }

    async function deleteRecord(date, ward) {
        if (!confirm(`¿Eliminar el registro del día ${date}?`)) return;
        const { error } = await supabaseClient
            .from('REGISTROS')
            .delete()
            .eq('date', date)
            .eq('ward', ward);
        if (error) {
            alert("Error al eliminar.");
            return;
        }
        await refreshAll();
        document.getElementById('registerFeedback').innerHTML =
            `<div class="alert alert-warning">🗑️ Registro del ${date} eliminado.</div>`;
    }

    // ================================================================
    // GUARDAR REGISTRO
    // ================================================================
    async function saveDailyRecord(e) {
        e.preventDefault();
        const date = document.getElementById('regDate').value;
        if (!date) { alert('Selecciona una fecha.'); return; }
        updateTotal();

        const record = {
            date,
            ward: FIXED_WARD,
            startPatients: parseInt(document.getElementById('startPatients').value) || 0,
            admissions: parseInt(document.getElementById('admissions').value) || 0,
            discharges: parseInt(document.getElementById('discharges').value) || 0,
            totalPatients: parseInt(document.getElementById('totalPatients').value) || 0,
            lppEvaluated: parseInt(document.getElementById('lppEvaluated').value) || 0,
            lppIncidence: parseInt(document.getElementById('lppIncidence').value) || 0,
            adverseEvents: parseInt(document.getElementById('adverseEvents').value) || 0,
            falls: parseInt(document.getElementById('falls').value) || 0,
            cvcDone: parseInt(document.getElementById('cvcDone').value) || 0,
            cvcTotal: parseInt(document.getElementById('cvcTotal').value) || 0,
            vmDone: parseInt(document.getElementById('vmDone').value) || 0,
            vmTotal: parseInt(document.getElementById('vmTotal').value) || 0,
            cupDone: parseInt(document.getElementById('cupDone').value) || 0,
            cupTotal: parseInt(document.getElementById('cupTotal').value) || 0,
            cvpTotal: parseInt(document.getElementById('cvpTotal').value) || 0,
            phlebitis: parseInt(document.getElementById('phlebitis').value) || 0,
            paeDay: parseInt(document.getElementById('paeDay').value) || 0,
            paeNight: parseInt(document.getElementById('paeNight').value) || 0,
            paeTotal: parseInt(document.getElementById('paeTotal').value) || 0,
            consciousnessDay: parseInt(document.getElementById('consciousnessDay').value) || 0,
            consciousnessNight: parseInt(document.getElementById('consciousnessNight').value) || 0,
            consciousnessExpected: parseInt(document.getElementById('consciousnessExpected').value) || 0,
            extra: {}
        };

        UCIN_FIELDS.forEach(f => {
            record.extra[f.num] = parseInt(document.getElementById(f.num).value) || 0;
            record.extra[f.den] = parseInt(document.getElementById(f.den).value) || 0;
        });

        const success = await saveData(record);
        if (success) {
            document.getElementById('registerFeedback').innerHTML =
                `<div class="alert alert-success">✅ Registro del día <strong>${date}</strong> guardado en la nube.</div>`;
            await refreshAll();
        } else {
            document.getElementById('registerFeedback').innerHTML =
                `<div class="alert alert-danger">❌ Error al guardar. Revisa la consola.</div>`;
        }
    }

    // ================================================================
    // REFRESH
    // ================================================================
    async function refreshAll() {
        await renderLastEntries();
        await renderUltimoRegistroIndicadores();
        await renderDashboard(FIXED_WARD);
        await renderReport(FIXED_WARD);
    }

    // ================================================================
    // INICIALIZACIÓN
    // ================================================================
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('regWard').value = FIXED_WARD;
        document.getElementById('wardDisplay').innerHTML = `<i class="fas fa-hospital me-1"></i> Unidad UCI`;
        document.querySelector('.alert-fixed strong').textContent = 'Unidad UCI';

        renderExtraFields();
        refreshAll();
        updateTotal();

        document.getElementById('dailyForm').addEventListener('submit', saveDailyRecord);
        document.getElementById('regDate').value = new Date().toISOString().split('T')[0];
        ['startPatients', 'admissions', 'discharges'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', updateTotal);
                el.addEventListener('change', updateTotal);
            }
        });
    });
</script>
</body>
</html>
