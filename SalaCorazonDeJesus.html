<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ===== ESTILOS ===== */
    body { background: linear-gradient(135deg, #f0f7fc 0%, #e6f0f9 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    .table-indicators th { background: #0a3d62; color: white; font-weight: 500; font-size: 0.85rem; text-align: center; vertical-align: middle; }
    .table-indicators td { text-align: center; vertical-align: middle; font-size: 0.9rem; }

    .form-label { font-weight: 600; color: #343a40; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }

    .form-control { border-radius: 30px; border: 1px solid #dce4ec; padding: 6px 16px; }
    .form-control:focus { border-color: #2c7da0; box-shadow: 0 0 0 0.2rem rgba(44,125,160,0.2); }
    .btn-primary { background: #0a3d62; border: none; border-radius: 30px; padding: 10px 30px; font-weight: 600; transition: 0.3s; }
    .btn-primary:hover { background: #062a44; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(10,61,98,0.3); }
    .btn-delete-record { background: none; border: none; color: #dc3545; cursor: pointer; font-size: 1.1rem; }
    .btn-delete-record:hover { color: #a71d2a; }
    .extra-fields-container .col-md-3 { margin-bottom: 10px; }
    .alert-fixed { background: #d4edda; border-color: #c3e6cb; color: #155724; border-radius: 30px; padding: 10px 20px; margin-bottom: 20px; }
    .alert-fixed i { margin-right: 10px; }
    .alert-warning-dashboard { background: #fff3cd; border-left: 6px solid #ffc107; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    .indicador-tabla th { background: #0a3d62; color: white; font-weight: 500; font-size: 0.85rem; text-align: center; vertical-align: middle; }
    .indicador-tabla td { text-align: center; vertical-align: middle; font-size: 0.9rem; }
    .table-sm th, .table-sm td { padding: 6px 8px; font-size: 0.85rem; }
    .help-icon { color: #2c7da0; cursor: help; margin-left: 4px; font-size: 0.9rem; }
    .status-green { background-color: #d4edda; color: #155724; }
    .status-yellow { background-color: #fff3cd; color: #856404; }

<body>

<nav class="navbar-custom">

<div class="container mt-4">
  <div class="alert-fixed">
    <i class="fas fa-lock"></i> Sala fija: <strong>Sala Corazón de Jesús</strong> – Los datos son privados para esta sala.

  <ul class="nav nav-tabs" id="myTab" role="tablist">

  <div class="tab-content" id="myTabContent">
    <!-- REGISTRO DIARIO -->
    <div class="tab-pane fade show active" id="register" role="tabpanel">
      <div class="card">
        <div class="card-header"><i class="fas fa-calendar-day"></i> Registrar Datos del Día</div>

          <form id="dailyForm">
            <div class="row g-3">

                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" id="regDate" required>

              <!-- DATOS DE PACIENTES -->
              <div class="col-md-3"><label class="form-label"><i class="fas fa-users"></i> Pacientes al inicio del día</label><input type="number" class="form-control" id="startPatients" value="0" min="0" required></div>
              <div class="col-md-3"><label class="form-label"><i class="fas fa-sign-in-alt"></i> Ingresos del día (nuevos pacientes)</label><input type="number" class="form-control" id="admissions" value="0" min="0"></div>
              <div class="col-md-3"><label class="form-label"><i class="fas fa-sign-out-alt"></i> Egresos del día</label><input type="number" class="form-control" id="discharges" value="0" min="0"></div>
              <div class="col-md-3"><label class="form-label"><i class="fas fa-calculator"></i> Total pacientes (calculado)</label><input type="number" class="form-control" id="totalPatients" readonly style="background:#e9ecef; font-weight:bold;"></div>

              <!-- INDICADORES COMUNES -->
              <div id="commonIndicators" class="row g-3">
                <div class="col-md-3"><label class="form-label">N° pacientes ingresados EVALUADOS con escala de riesgo LPP</label><input type="number" class="form-control" id="lppEvaluated" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° pacientes que desarrollan LPP (durante su estancia)</label><input type="number" class="form-control" id="lppIncidence" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Eventos Adversos notificados en el día</label><input type="number" class="form-control" id="adverseEvents" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Caídas ocurridas en el día</label><input type="number" class="form-control" id="falls" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Cuidados CVC realizados en el día</label><input type="number" class="form-control" id="cvcDone" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Oportunidades de cuidado CVC en el día</label><input type="number" class="form-control" id="cvcTotal" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Cuidados VM realizados en el día</label><input type="number" class="form-control" id="vmDone" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Oportunidades de cuidado VM en el día</label><input type="number" class="form-control" id="vmTotal" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Cuidados CUP realizados en el día</label><input type="number" class="form-control" id="cupDone" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Oportunidades de cuidado CUP en el día</label><input type="number" class="form-control" id="cupTotal" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Pacientes con CVP en el día</label><input type="number" class="form-control" id="cvpTotal" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Flebitis (CVP) en el día</label><input type="number" class="form-control" id="phlebitis" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label" style="color:#17a2b8;">N° PAE ejecutados en el turno día</label><input type="number" class="form-control" id="paeDay" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label" style="color:#6f42c1;">N° PAE ejecutados en el turno noche</label><input type="number" class="form-control" id="paeNight" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Total PAE que debieron registrarse (día + noche)</label><input type="number" class="form-control" id="paeTotal" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label" style="color:#007bff;">N° Glasgow registradas en el turno día</label><input type="number" class="form-control" id="consciousnessDay" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label" style="color:#6610f2;">N° Glasgow registradas en el turno noche</label><input type="number" class="form-control" id="consciousnessNight" value="0" min="0"></div>
                <div class="col-md-3"><label class="form-label">N° Total Glasgow que debieron registrarse (día + noche)</label><input type="number" class="form-control" id="consciousnessExpected" value="0" min="0"></div>
              </div>

              <!-- CAMPOS EXTRAS: CIRUGÍAS -->
              <div id="extraFieldsContainer" class="row g-3 mt-2 extra-fields-container"></div>

              <div class="col-12 mt-3">
                <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save me-2"></i> Guardar Registro</button>
              </div>
            </div>
          </form>
          <div id="registerFeedback" class="mt-3"></div>
        </div>
      </div>

      <div class="card mt-3">
        <div class="card-header"><i class="fas fa-table me-2"></i>Indicadores del último registro</div>
        <div class="card-body" id="ultimoRegistroIndicadores" style="max-height: 400px; overflow-y: auto;">
          <p class="text-muted">Aún no hay registros.</p>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><i class="fas fa-history"></i> Últimos Registros</div>
        <div class="card-body" id="lastEntries" style="max-height: 300px; overflow-y: auto;"><p class="text-muted">Aún no hay registros.</p></div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div class="tab-pane fade" id="dashboard" role="tabpanel">
      <div id="dashboardContent"><div class="alert alert-info">Cargando indicadores...</div></div>
    </div>

    <!-- REPORTE -->
    <div class="tab-pane fade" id="report" role="tabpanel">
      <div id="reportContent"><div class="alert alert-info">Cargando reporte...</div></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ================================================================
  // CONFIGURACIÓN SUPABASE
  // ================================================================
  const SUPABASE_URL = 'https://hdhqzawcylkvttsqqjty.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_x5r7hUrN2pzVexbtZ_b0Wg_OBDEMAKP';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const FIXED_WARD = 'Sala Corazón de Jesús';

  // ================================================================
  // CONFIGURACIÓN DE INDICADORES POR SALA (Cirugías)
  // ================================================================
  const WARD_CONFIG = {
    'Sala Corazón de Jesús': { extras: ['surgery'] },
  };
  const EXTRA_INDICATORS = {
    'surgery': { label: 'Cirugías Programadas', numerator: 'surgeryDone', denominator: 'surgeryTotal', format: 'percent' },
  };

  const EXTRA_KEYS = ['surgeryDone', 'surgeryTotal'];

  function getExtraFields(ward) {
    const config = WARD_CONFIG[ward];
    if (!config) return [];
    const extras = config.extras;
    const result = [];
    if (extras.includes('surgery')) result.push('surgery');
    return result;
  }

  // ================================================================
  // SEMÁFORO SUAVE (sin límite mínimo para cirugías)
  // ================================================================
  function obtenerSemaforo(nombre, valor, denominador) {
    const umbrales = {
      'Cobertura LPP': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
      'Incidencia LPP': { verde: 5, amarillo: 12, rojo: 20, invertido: true },
      'Tasa EA (x1000)': { verde: 30, amarillo: 60, rojo: 120, invertido: true },
      'Tasa Caídas (x1000)': { verde: 20, amarillo: 50, rojo: 100, invertido: true },
      'Cumpl. CVC': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
      'Cumpl. VM': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
      'Cumpl. CUP': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
      'Cumpl. PAE': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
      'Flebitis (CVP)': { verde: 5, amarillo: 10, rojo: 20, invertido: true },
      'Cumpl. Glasgow': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
      'Cirugías Programadas': { verde: 90, amarillo: 70, rojo: 50, invertido: false },
    };

    const minDen = { 'Tasa EA (x1000)': 30, 'Tasa Caídas (x1000)': 30 };
    const min = minDen[nombre] || 5;
    // Para Cirugías Programadas, no aplicar límite mínimo
    if (nombre !== 'Cirugías Programadas' && denominador < min) {
      return { color: 'status-neutral', texto: 'Datos del mes' };
    }

    const u = umbrales[nombre] || { verde: 90, amarillo: 70, rojo: 50, invertido: false };
    let color, texto;

    if (u.invertido) {
      if (valor <= u.verde) { color = 'status-green'; texto = 'Cumplido'; }
      else if (valor <= u.amarillo) { color = 'status-yellow'; texto = 'En observación'; }
      else if (valor <= u.rojo) { color = 'status-yellow'; texto = 'En observación'; }
      else { color = 'status-red'; texto = 'Revisar'; }
    } else {
      if (valor >= u.verde) { color = 'status-green'; texto = 'Cumplido'; }
      else if (valor >= u.amarillo) { color = 'status-yellow'; texto = 'En observación'; }
      else if (valor >= u.rojo) { color = 'status-yellow'; texto = 'En observación'; }
      else { color = 'status-red'; texto = 'Revisar'; }
    }

    return { color, texto };
  }

  // ================================================================
  // GESTIÓN DE DATOS
  // ================================================================
  async function getData() {
    const { data, error } = await supabaseClient
      .from("REGISTROS")
      .select("*")
      .eq("ward", FIXED_WARD)
      .order("date", { ascending: true });
    if (error) { console.error(error); return []; }
    return data.map(row => row.data);
  }

  async function saveData(record) {
    const { data: existing, error: checkError } = await supabaseClient
      .from("REGISTROS")
      .select("id")
      .eq("date", record.date)
      .eq("ward", FIXED_WARD)
      .maybeSingle();
    if (checkError) { console.error(checkError); alert("Error de verificación"); return false; }
    if (existing) {
      const { error } = await supabaseClient
        .from("REGISTROS")
        .update({ data: record })
        .eq("id", existing.id);
      if (error) { console.error(error); alert("Error al actualizar"); return false; }
    } else {
      const { error } = await supabaseClient
        .from("REGISTROS")
        .insert({ date: record.date, ward: FIXED_WARD, data: record });
      if (error) { console.error(error); alert("Error al insertar"); return false; }
    }
    return true;
  }

  function updateTotal() {
    const start = parseInt(document.getElementById('startPatients').value) || 0;
    const adm = parseInt(document.getElementById('admissions').value) || 0;
    const dis = parseInt(document.getElementById('discharges').value) || 0;
    document.getElementById('totalPatients').value = Math.max(0, start + adm - dis);
  }

  function renderExtraFields(ward) {
    const container = document.getElementById('extraFieldsContainer');
    container.innerHTML = '';
    const extras = getExtraFields(ward);
    if (extras.length === 0) {
      container.innerHTML = '<div class="col-12 text-muted">No hay indicadores adicionales.</div>';
      return;
    }
    extras.forEach(extraKey => {
      const def = EXTRA_INDICATORS[extraKey];
      if (!def) return;
      // Numerador
      const col1 = document.createElement('div');
      col1.className = 'col-md-3';
      col1.innerHTML = `<label class="form-label">N° Cirugías realizadas</label><input type="number" class="form-control" id="${def.numerator}" value="0" min="0">`;
      container.appendChild(col1);
      // Denominador (independiente)
      const col2 = document.createElement('div');
      col2.className = 'col-md-3';
      col2.innerHTML = `<label class="form-label">N° Cirugías programadas</label><input type="number" class="form-control" id="${def.denominator}" value="0" min="0">`;
      container.appendChild(col2);
    });
  }

  // ================================================================
  // INDICADORES DEL ÚLTIMO REGISTRO
  // ================================================================
  function calcularIndicadores(record) {
    const indicadores = {};
    const total = record.totalPatients || 0;
    const lppEval = record.lppEvaluated || 0;
    const cvpTotal = record.cvpTotal || 0;
    const admissions = record.admissions || 0;
    const glasgowDay = record.consciousnessDay || 0;
    const glasgowNight = record.consciousnessNight || 0;
    const glasgowExpected = record.consciousnessExpected || 0;
    const extra = record.extra || {};

    const base = [
      { key: 'coberturaLPP', label: 'Cobertura LPP', num: 'lppEvaluated', den: 'admissions', fmt: 'percent' },
      { key: 'incidenciaLPP', label: 'Incidencia LPP', num: 'lppIncidence', den: 'lppEvaluated', fmt: 'percent' },
      { key: 'tasaEA', label: 'Tasa EA (x1000)', num: 'adverseEvents', den: 'totalPatients', fmt: 'rate' },
      { key: 'tasaCaidas', label: 'Tasa Caídas (x1000)', num: 'falls', den: 'totalPatients', fmt: 'rate' },
      { key: 'cumplimientoCVC', label: 'Cumpl. CVC', num: 'cvcDone', den: 'cvcTotal', fmt: 'percent' },
      { key: 'cumplimientoVM', label: 'Cumpl. VM', num: 'vmDone', den: 'vmTotal', fmt: 'percent' },
      { key: 'cumplimientoCUP', label: 'Cumpl. CUP', num: 'cupDone', den: 'cupTotal', fmt: 'percent' },
      { key: 'incidenciaFlebitis', label: 'Flebitis (CVP)', num: 'phlebitis', den: 'cvpTotal', fmt: 'percent' },
      { key: 'cumplimientoPAE', label: 'Cumpl. PAE', num: 'paeDay+paeNight', den: 'paeTotal', fmt: 'percent' },
      { key: 'cumplimientoGlasgow', label: 'Cumpl. Glasgow', num: 'consciousnessDay+consciousnessNight', den: 'consciousnessExpected', fmt: 'percent' },
    ];

    // Agregar extras
    const extras = getExtraFields(FIXED_WARD);
    extras.forEach(extraKey => {
      const def = EXTRA_INDICATORS[extraKey];
      if (!def) return;
      const num = extra[def.numerator] || 0;
      const den = extra[def.denominator] || 0;
      let result = 0;
      if (den > 0) {
        if (def.format === 'percent') result = (num / den) * 100;
        else if (def.format === 'rate') result = (num / den) * 1000;
        else result = num / den;
      }
      base.push({
        key: extraKey,
        label: def.label,
        num: def.numerator,
        den: def.denominator,
        fmt: def.format,
        isExtra: true
      });
    });

    base.forEach(ind => {
      let num = 0, den = 0;
      if (ind.isExtra) {
        num = extra[ind.num] || 0;
        den = extra[ind.den] || 0;
      } else if (ind.num.includes('+')) {
        const parts = ind.num.split('+');
        num = parts.reduce((s, p) => (s + (record[p.trim()] || 0)), 0);
      } else {
        num = record[ind.num] || 0;
        den = record[ind.den] || 0;
      }
      let result = 0;
      if (den > 0) {
        if (ind.fmt === 'percent') result = (num / den) * 100;
        else if (ind.fmt === 'rate') result = (num / den) * 1000;
        else result = num / den;
      }
      indicadores[ind.key] = { label: ind.label, numerator: num, denominator: den, result, format: ind.fmt };
    });
    return indicadores;
  }

  async function renderUltimoRegistroIndicadores() {
    const container = document.getElementById('ultimoRegistroIndicadores');
    const data = await getData();
    if (data.length === 0) {
      container.innerHTML = '<p class="text-muted">No hay registros aún.</p>';
      return;
    }
    const ultimo = data.sort((a,b) => b.date.localeCompare(a.date))[0];
    const indicadores = calcularIndicadores(ultimo);
    let html = `<div class="table-responsive"><table class="table table-bordered table-sm indicador-tabla">
      <thead><tr><th>Indicador</th><th>Numerador</th><th>Denominador</th><th>Resultado</th></tr></thead><tbody>`;
    for (const key in indicadores) {
      const ind = indicadores[key];
      let resultado = '—';
      if (ind.denominator > 0) {
        if (ind.format === 'percent') resultado = ind.result.toFixed(1) + '%';
        else if (ind.format === 'rate') resultado = ind.result.toFixed(1);
        else resultado = ind.result.toFixed(1);
      }
      html += `<tr><td><strong>${ind.label}</strong></td><td>${ind.numerator}</td><td>${ind.denominator}</td><td>${resultado}</td></tr>`;
    }
    html += '</tbody></table></div>';
    container.innerHTML = html;
  }

  // ================================================================
  // DASHBOARD (con denominadores independientes para extras)
  // ================================================================
  async function renderDashboard(ward, selectedMonth = null) {
    const container = document.getElementById('dashboardContent');
    const data = await getData();
    if (data.length === 0) {
      container.innerHTML = `<div class="alert alert-warning">No hay registros para <strong>${ward}</strong>. Comienza a registrar.</div>`;
      return;
    }

    const months = {};
    data.forEach(d => {
      const key = d.date.substring(0,7);
      if (!months[key]) months[key] = [];
      months[key].push(d);
    });
    const sortedMonths = Object.keys(months).sort();
    const names = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Set','Oct','Nov','Dic'];

    let displayMonth = selectedMonth;
    if (!displayMonth || !sortedMonths.includes(displayMonth)) {
      displayMonth = sortedMonths[sortedMonths.length - 1];
    }
    if (!displayMonth) {
      container.innerHTML = `<div class="alert alert-warning">No hay datos disponibles.</div>`;
      return;
    }

    function sumarCampos(monthData) {
      const sum = {};
      monthData.forEach(r => {
        for (const key in r) {
          if (typeof r[key] === 'number') {
            // Excluir claves de extras para evitar duplicación
            if (!EXTRA_KEYS.includes(key)) {
              if (!sum[key]) sum[key] = 0;
              sum[key] += r[key];
            }
          }
        }
        if (r.extra) {
          for (const key in r.extra) {
            if (typeof r.extra[key] === 'number') {
              if (!sum[key]) sum[key] = 0;
              sum[key] += r.extra[key];
            }
          }
        }
      });
      return sum;
    }

    const sum = sumarCampos(months[displayMonth]);
    const totalPatients = sum.totalPatients || 0;
    const lppEval = sum.lppEvaluated || 0;
    const cvpTotal = sum.cvpTotal || 0;
    const admissions = sum.admissions || 0;
    const glasgowDay = sum.consciousnessDay || 0;
    const glasgowNight = sum.consciousnessNight || 0;
    const glasgowExpected = sum.consciousnessExpected || 0;

    // Extraer valores de los extras
    const extra = {};
    const extras = getExtraFields(FIXED_WARD);
    extras.forEach(extraKey => {
      const def = EXTRA_INDICATORS[extraKey];
      if (!def) return;
      extra[def.numerator] = sum[def.numerator] || 0;
      extra[def.denominator] = sum[def.denominator] || 0;
    });

    const detalle = {
      totalPatients: totalPatients,
      admissions: admissions,
      lppEvaluated: lppEval,
      lppIncidence: sum.lppIncidence || 0,
      adverseEvents: sum.adverseEvents || 0,
      falls: sum.falls || 0,
      cvcDone: sum.cvcDone || 0,
      cvcTotal: sum.cvcTotal || 0,
      vmDone: sum.vmDone || 0,
      vmTotal: sum.vmTotal || 0,
      cupDone: sum.cupDone || 0,
      cupTotal: sum.cupTotal || 0,
      cvpTotal: cvpTotal,
      phlebitis: sum.phlebitis || 0,
      paeDay: sum.paeDay || 0,
      paeNight: sum.paeNight || 0,
      paeTotal: sum.paeTotal || 0,
      consciousnessDay: glasgowDay,
      consciousnessNight: glasgowNight,
      consciousnessExpected: glasgowExpected,
      extra: extra,
      coberturaLPP: admissions > 0 ? ((sum.lppEvaluated || 0) / admissions * 100) : 0,
      incidenciaLPP: lppEval > 0 ? ((sum.lppIncidence || 0) / lppEval * 100) : 0,
      tasaEA: totalPatients > 0 ? ((sum.adverseEvents || 0) / totalPatients * 1000) : 0,
      tasaCaidas: totalPatients > 0 ? ((sum.falls || 0) / totalPatients * 1000) : 0,
      cumplimientoCVC: (sum.cvcTotal || 0) > 0 ? ((sum.cvcDone || 0) / (sum.cvcTotal || 0) * 100) : 0,
      cumplimientoVM: (sum.vmTotal || 0) > 0 ? ((sum.vmDone || 0) / (sum.vmTotal || 0) * 100) : 0,
      cumplimientoCUP: (sum.cupTotal || 0) > 0 ? ((sum.cupDone || 0) / (sum.cupTotal || 0) * 100) : 0,
      incidenciaFlebitis: cvpTotal > 0 ? ((sum.phlebitis || 0) / cvpTotal * 100) : 0,
      cumplimientoPAE: (sum.paeTotal || 0) > 0 ? (((sum.paeDay || 0) + (sum.paeNight || 0)) / (sum.paeTotal || 0) * 100) : 0,
      cumplimientoGlasgow: glasgowExpected > 0 ? (((sum.consciousnessDay || 0) + (sum.consciousnessNight || 0)) / glasgowExpected * 100) : 0,
      surgeryDone: extra.surgeryDone || 0,
      surgeryTotal: extra.surgeryTotal || 0,
      cirugias: extra.surgeryTotal > 0 ? ((extra.surgeryDone || 0) / extra.surgeryTotal * 100) : 0,
    };

    const hasPatients = totalPatients > 0;

    let monthOptions = sortedMonths.map(m => {
      const [y, mo] = m.split('-');
      const label = `${names[parseInt(mo)-1]} ${y}`;
      const selected = (m === displayMonth) ? 'selected' : '';
      return `<option value="${m}" ${selected}>${label}</option>`;
    }).join('');

    let html = `<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
        <h4 class="mb-2"><i class="fas fa-chart-pie me-2"></i> Dashboard - ${ward}</h4>
        <div>
            <label class="me-2" style="font-weight:600;">📅 Mes:</label>
            <select id="monthSelector" class="form-select" onchange="renderDashboard('${ward}', this.value)" style="width:auto;display:inline-block;border-radius:30px;padding:6px 20px;">
                ${monthOptions}
            </select>
        </div>
    </div>`;

    if (!hasPatients) {
      html += `<div class="alert-warning-dashboard">
        <i class="fas fa-exclamation-triangle me-2"></i> <strong>Este mes no tiene pacientes registrados</strong> (o solo datos en cero).
      </div>`;
    }

    // KPIs (incluyendo extra)
    const kpis = [
      { label: 'Cobertura LPP', value: detalle.coberturaLPP, unit: '%', den: detalle.admissions },
      { label: 'Incidencia LPP', value: detalle.incidenciaLPP, unit: '%', den: detalle.lppEvaluated },
      { label: 'Tasa EA (x1000)', value: detalle.tasaEA, unit: '', den: detalle.totalPatients },
      { label: 'Tasa Caídas (x1000)', value: detalle.tasaCaidas, unit: '', den: detalle.totalPatients },
      { label: 'Cumpl. CVC', value: detalle.cumplimientoCVC, unit: '%', den: detalle.cvcTotal },
      { label: 'Cumpl. VM', value: detalle.cumplimientoVM, unit: '%', den: detalle.vmTotal },
      { label: 'Cumpl. CUP', value: detalle.cumplimientoCUP, unit: '%', den: detalle.cupTotal },
      { label: 'Flebitis (CVP)', value: detalle.incidenciaFlebitis, unit: '%', den: detalle.cvpTotal },
      { label: 'Cumpl. PAE', value: detalle.cumplimientoPAE, unit: '%', den: detalle.paeTotal },
      { label: 'Cumpl. Glasgow', value: detalle.cumplimientoGlasgow, unit: '%', den: detalle.consciousnessExpected },
      { label: 'Cirugías Programadas', value: detalle.cirugias, unit: '%', den: detalle.surgeryTotal }
    ];
    html += `<div class="row g-3 mb-4">`;
    kpis.forEach(k => {
      const val = typeof k.value === 'number' ? k.value.toFixed(1) : '0.0';
      const sem = obtenerSemaforo(k.label, k.value, k.den || 1);
      html += `<div class="col-md-3"><div class="kpi-card" style="border-left-color: ${sem.color === 'status-green' ? '#28a745' : sem.color === 'status-yellow' ? '#ffc107' : sem.color === 'status-red' ? '#dc3545' : '#6c757d'};">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value">${val}<span class="kpi-unit">${k.unit}</span></div>
        <small class="${sem.color} sem-foro-texto">${sem.texto}</small>
      </div></div>`;
    });
    html += `</div>`;

    // Gráfico de barras
    const chartLabels = ['Cob. LPP','Inc. LPP','Cumpl. CVC','Cumpl. VM','Cumpl. CUP','Flebitis','Cumpl. PAE','Cumpl. Glasgow','Cirugías'];
    const chartData = [
      detalle.coberturaLPP,
      detalle.incidenciaLPP,
      detalle.cumplimientoCVC,
      detalle.cumplimientoVM,
      detalle.cumplimientoCUP,
      detalle.incidenciaFlebitis,
      detalle.cumplimientoPAE,
      detalle.cumplimientoGlasgow,
      detalle.cirugias
    ];
    const colors = ['#0a3d62','#e74c3c','#8e44ad','#1abc9c','#3498db','#e84393','#28a745','#f39c12','#6f42c1'];

    html += `<div class="row">
      <div class="col-md-12"><div class="chart-container"><canvas id="chartTodosIndicadores"></canvas></div></div>
    </div>`;

    // Tabla de detalle
    html += `<div class="card mt-4">
      <div class="card-header"><i class="fas fa-table me-2"></i>Detalle de indicadores (${names[parseInt(displayMonth.split('-')[1])-1]} ${displayMonth.split('-')[0]})</div>
      <div class="card-body">
        <div class="table-responsive"><table class="table table-bordered table-striped indicador-tabla">
          <thead><tr><th>Indicador</th><th>Numerador</th><th>Denominador</th><th>Resultado</th><th>Estado</th></tr></thead><tbody>`;

    const filas = [
      { label: 'Cobertura LPP', num: detalle.lppEvaluated, den: detalle.admissions, fmt: 'percent' },
      { label: 'Incidencia LPP', num: detalle.lppIncidence, den: detalle.lppEvaluated, fmt: 'percent' },
      { label: 'Tasa EA (x1000)', num: detalle.adverseEvents, den: detalle.totalPatients, fmt: 'rate' },
      { label: 'Tasa Caídas (x1000)', num: detalle.falls, den: detalle.totalPatients, fmt: 'rate' },
      { label: 'Cumpl. CVC', num: detalle.cvcDone, den: detalle.cvcTotal, fmt: 'percent' },
      { label: 'Cumpl. VM', num: detalle.vmDone, den: detalle.vmTotal, fmt: 'percent' },
      { label: 'Cumpl. CUP', num: detalle.cupDone, den: detalle.cupTotal, fmt: 'percent' },
      { label: 'Flebitis (CVP)', num: detalle.phlebitis, den: detalle.cvpTotal, fmt: 'percent' },
      { label: 'Cumpl. PAE', num: detalle.paeDay + detalle.paeNight, den: detalle.paeTotal, fmt: 'percent' },
      { label: 'Cumpl. Glasgow', num: detalle.consciousnessDay + detalle.consciousnessNight, den: detalle.consciousnessExpected, fmt: 'percent' },
      { label: 'Cirugías Programadas', num: detalle.surgeryDone, den: detalle.surgeryTotal, fmt: 'percent' },
    ];

    filas.forEach(ind => {
      let resultado = '—';
      let val = 0;
      if (ind.den > 0) {
        const num = ind.num || 0;
        const den = ind.den || 0;
        if (ind.fmt === 'percent') val = (num / den) * 100;
        else if (ind.fmt === 'rate') val = (num / den) * 1000;
        else val = num / den;
        if (ind.fmt === 'percent') resultado = val.toFixed(1) + '%';
        else if (ind.fmt === 'rate') resultado = val.toFixed(1);
        else resultado = val.toFixed(1);
      }
      const sem = obtenerSemaforo(ind.label, val, ind.den);
      html += `<tr class="${sem.color}">
        <td><strong>${ind.label}</strong></td>
        <td>${ind.num}</td>
        <td>${ind.den}</td>
        <td>${resultado}</td>
        <td>${sem.texto}</td>
      </tr>`;
    });

    html += `</tbody></table></div></div></div>`;

    container.innerHTML = html;

    setTimeout(() => {
      const ctx = document.getElementById('chartTodosIndicadores');
      if (ctx) {
        if (window.chartTodos) window.chartTodos.destroy();
        window.chartTodos = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: chartLabels,
            datasets: [{
              label: displayMonth,
              data: chartData,
              backgroundColor: colors,
              borderRadius: 6,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.parsed.y.toFixed(1) + '%' } } },
            scales: { y: { beginAtZero: true, title: { display: true, text: '%' } } }
          }
        });
      }
    }, 300);
  }

  // ================================================================
  // REPORTE TRIMESTRAL
  // ================================================================
  async function renderReport(ward) {
    const container = document.getElementById('reportContent');
    const data = await getData();
    if (data.length === 0) {
      container.innerHTML = `<div class="alert alert-warning">No hay datos para <strong>${ward}</strong>.</div>`;
      return;
    }

    function getQuarter(m) {
      const mo = parseInt(m.split('-')[1]);
      if (mo <= 3) return 'Trim I';
      if (mo <= 6) return 'Trim II';
      if (mo <= 9) return 'Trim III';
      return 'Trim IV';
    }

    const quarters = {};
    data.forEach(d => {
      const key = d.date.substring(0,7);
      const q = getQuarter(key);
      if (!quarters[q]) quarters[q] = [];
      quarters[q].push(d);
    });

    const sortedQuarters = ['Trim I', 'Trim II', 'Trim III', 'Trim IV'];
    const quarterData = {};
    sortedQuarters.forEach(q => {
      const records = quarters[q] || [];
      if (records.length === 0) { quarterData[q] = null; return; }
      const sum = {};
      records.forEach(r => {
        for (const key in r) {
          if (typeof r[key] === 'number') {
            if (!EXTRA_KEYS.includes(key)) {
              if (!sum[key]) sum[key] = 0;
              sum[key] += r[key];
            }
          }
        }
        if (r.extra) {
          for (const key in r.extra) {
            if (typeof r.extra[key] === 'number') {
              if (!sum[key]) sum[key] = 0;
              sum[key] += r.extra[key];
            }
          }
        }
      });
      const totalPatients = sum.totalPatients || 0;
      const lppEval = sum.lppEvaluated || 0;
      const cvpTotal = sum.cvpTotal || 0;
      const admissions = sum.admissions || 0;
      const glasgowExpected = sum.consciousnessExpected || 0;
      const surgeryTotal = sum.surgeryTotal || 0;
      const ind = {
        totalPatients: totalPatients,
        admissions: admissions,
        coberturaLPP: admissions > 0 ? ((sum.lppEvaluated || 0) / admissions * 100) : 0,
        incidenciaLPP: lppEval > 0 ? ((sum.lppIncidence || 0) / lppEval * 100) : 0,
        tasaEA: totalPatients > 0 ? ((sum.adverseEvents || 0) / totalPatients * 1000) : 0,
        tasaCaidas: totalPatients > 0 ? ((sum.falls || 0) / totalPatients * 1000) : 0,
        cumplimientoCVC: (sum.cvcTotal || 0) > 0 ? ((sum.cvcDone || 0) / (sum.cvcTotal || 0) * 100) : 0,
        cumplimientoVM: (sum.vmTotal || 0) > 0 ? ((sum.vmDone || 0) / (sum.vmTotal || 0) * 100) : 0,
        cumplimientoCUP: (sum.cupTotal || 0) > 0 ? ((sum.cupDone || 0) / (sum.cupTotal || 0) * 100) : 0,
        incidenciaFlebitis: cvpTotal > 0 ? ((sum.phlebitis || 0) / cvpTotal * 100) : 0,
        cumplimientoPAE: (sum.paeTotal || 0) > 0 ? (((sum.paeDay || 0) + (sum.paeNight || 0)) / (sum.paeTotal || 0) * 100) : 0,
        cumplimientoGlasgow: glasgowExpected > 0 ? (((sum.consciousnessDay || 0) + (sum.consciousnessNight || 0)) / glasgowExpected * 100) : 0,
        cirugias: surgeryTotal > 0 ? ((sum.surgeryDone || 0) / surgeryTotal * 100) : 0,
      };
      quarterData[q] = ind;
    });

    let html = `<h4>Reporte Trimestral - ${ward}</h4>
    <p class="text-muted">Datos acumulados por trimestre.</p>
    <div class="table-responsive">
      <table class="table table-bordered table-striped table-indicators" id="quarterTable">
        <thead><tr><th>Indicador</th>${sortedQuarters.map(q => `<th>${q}</th>`).join('')}</tr></thead><tbody>`;

    const rows = [
      { label: 'Pacientes-día (total)', key: 'totalPatients', fmt: v => v },
      { label: 'Cobertura LPP', key: 'coberturaLPP', fmt: v => (v).toFixed(1)+'%' },
      { label: 'Incidencia LPP', key: 'incidenciaLPP', fmt: v => (v).toFixed(1)+'%' },
      { label: 'Tasa EA (x1000 días)', key: 'tasaEA', fmt: v => (v).toFixed(1) },
      { label: 'Tasa Caídas (x1000 días)', key: 'tasaCaidas', fmt: v => (v).toFixed(1) },
      { label: 'Cumpl. CVC', key: 'cumplimientoCVC', fmt: v => (v).toFixed(1)+'%' },
      { label: 'Cumpl. VM', key: 'cumplimientoVM', fmt: v => (v).toFixed(1)+'%' },
      { label: 'Cumpl. CUP', key: 'cumplimientoCUP', fmt: v => (v).toFixed(1)+'%' },
      { label: 'Flebitis (CVP)', key: 'incidenciaFlebitis', fmt: v => (v).toFixed(1)+'%' },
      { label: 'Cumpl. PAE (D+N)', key: 'cumplimientoPAE', fmt: v => (v).toFixed(1)+'%' },
      { label: 'Cumpl. Glasgow', key: 'cumplimientoGlasgow', fmt: v => (v).toFixed(1)+'%' },
      { label: 'Cirugías Programadas', key: 'cirugias', fmt: v => (v).toFixed(1)+'%' },
    ];

    rows.forEach(row => {
      html += `<tr><td><strong>${row.label}</strong></td>`;
      sortedQuarters.forEach(q => {
        const qData = quarterData[q];
        let val = 0;
        if (qData) {
          val = qData[row.key] !== undefined ? qData[row.key] : 0;
        }
        html += `<td>${row.fmt(val)}</td>`;
      });
      html += `</tr>`;
    });

    html += `</tbody></table>
    <button class="btn btn-outline-primary mt-3" onclick="copyTable()"><i class="fas fa-copy me-2"></i> Copiar Tabla</button>
    </div>`;
    container.innerHTML = html;
  }

  function copyTable() {
    const table = document.getElementById('quarterTable');
    if (!table) return;
    const range = document.createRange();
    range.selectNode(table);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    alert('Tabla copiada al portapapeles.');
  }

  async function deleteRecord(date, ward) {
    if (!confirm(`¿Eliminar el registro del día ${date}?`)) return;
    const { error } = await supabaseClient
      .from('REGISTROS')
      .delete()
      .eq('date', date)
      .eq('ward', ward);
    if (error) {
      alert("Error al eliminar.");
      return;
    }
    await refreshAll();
    document.getElementById('registerFeedback').innerHTML = `<div class="alert alert-warning">🗑️ Registro del ${date} eliminado.</div>`;
  }

    await renderUltimoRegistroIndicadores();

  async function saveDailyRecord(e) {
    e.preventDefault();
    const date = document.getElementById('regDate').value;
    if (!date) { alert('Selecciona una fecha.'); return; }
    updateTotal();
    const totalPatients = parseInt(document.getElementById('totalPatients').value) || 0;
    const admissions = parseInt(document.getElementById('admissions').value) || 0;

    const lppEval = parseInt(document.getElementById('lppEvaluated').value) || 0;
    const lppInc = parseInt(document.getElementById('lppIncidence').value) || 0;
    const paeDay = parseInt(document.getElementById('paeDay').value) || 0;
    const paeNight = parseInt(document.getElementById('paeNight').value) || 0;
    const paeTotal = parseInt(document.getElementById('paeTotal').value) || 0;
    const glasgowDay = parseInt(document.getElementById('consciousnessDay').value) || 0;
    const glasgowNight = parseInt(document.getElementById('consciousnessNight').value) || 0;
    const glasgowExpected = parseInt(document.getElementById('consciousnessExpected').value) || 0;

    const surgeryDone = parseInt(document.getElementById('surgeryDone').value) || 0;
    const surgeryTotal = parseInt(document.getElementById('surgeryTotal').value) || 0;

    let errors = [];
    if (lppEval > admissions) errors.push('Evaluados LPP no puede ser mayor que Ingresos del día.');
    if (lppInc > lppEval) errors.push('LPP (>48h) no puede ser mayor que Evaluados LPP.');
    if (paeDay + paeNight > paeTotal) errors.push('PAE ejecutados no puede ser mayor que PAE que debieron registrarse.');
    if (glasgowDay + glasgowNight > glasgowExpected) errors.push('Glasgow registradas no puede ser mayor que Glasgow que debieron registrarse.');
    if (surgeryDone > surgeryTotal) errors.push('Cirugías realizadas no puede ser mayor que programadas.');

    if (errors.length > 0) {
      alert('⚠️ Datos inconsistentes:\n' + errors.join('\n') + '\n\nCorrige los valores antes de guardar.');
      return;
    }

    const record = {
      date, ward: FIXED_WARD,
      startPatients: parseInt(document.getElementById('startPatients').value) || 0,
      admissions: admissions,
      discharges: parseInt(document.getElementById('discharges').value) || 0,
      totalPatients,
      lppEvaluated: lppEval,
      lppIncidence: lppInc,
      adverseEvents: parseInt(document.getElementById('adverseEvents').value) || 0,
      falls: parseInt(document.getElementById('falls').value) || 0,
      cvcDone: parseInt(document.getElementById('cvcDone').value) || 0,
      cvcTotal: parseInt(document.getElementById('cvcTotal').value) || 0,
      vmDone: parseInt(document.getElementById('vmDone').value) || 0,
      vmTotal: parseInt(document.getElementById('vmTotal').value) || 0,
      cupDone: parseInt(document.getElementById('cupDone').value) || 0,
      cupTotal: parseInt(document.getElementById('cupTotal').value) || 0,
      cvpTotal: parseInt(document.getElementById('cvpTotal').value) || 0,
      phlebitis: parseInt(document.getElementById('phlebitis').value) || 0,
      paeDay, paeNight, paeTotal,
      consciousnessDay: glasgowDay,
      consciousnessNight: glasgowNight,
      consciousnessExpected: glasgowExpected,
      extra: {
        surgeryDone: surgeryDone,
        surgeryTotal: surgeryTotal
      }
    };

    const success = await saveData(record);
    if (success) {
      document.getElementById('registerFeedback').innerHTML = `<div class="alert alert-success">✅ Registro del día <strong>${date}</strong> guardado en la nube.</div>`;
      await refreshAll();
    } else {
      document.getElementById('registerFeedback').innerHTML = `<div class="alert alert-danger">❌ Error al guardar. Revisa la consola.</div>`;
    }
  }

  // ================================================================
  // INICIALIZACIÓN
  // ================================================================
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('regWard').value = FIXED_WARD;
    document.getElementById('wardDisplay').innerHTML = `<i class="fas fa-hospital me-1"></i> Sala Corazón de Jesús`;
    document.querySelector('.alert-fixed strong').textContent = 'Sala Corazón de Jesús';

    renderExtraFields(FIXED_WARD);
    refreshAll();
    updateTotal();

    document.getElementById('dailyForm').addEventListener('submit', saveDailyRecord);
    document.getElementById('regDate').value = new Date().toISOString().split('T')[0];
    ['startPatients','admissions','discharges'].forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('input', updateTotal);
        el.addEventListener('change', updateTotal);
      }
    });

    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl);
    });
  });
</script>
</body>
</html>
